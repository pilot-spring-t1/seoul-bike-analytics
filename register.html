<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 | 따릉이 분석 서비스</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/login.css"> </head>
<body class="login-body">
    <div class="login-container">
        <div class="login-box" style="max-width: 500px;">
            <h2>JOIN US</h2>
            <p>따릉이 데이터 분석 일원이 되어보세요</p>
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-username">아이디</label>
                    <input type="text" id="reg-username" placeholder="4~12자 영문/숫자" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">비밀번호</label>
                    <input type="password" id="reg-password" placeholder="8자 이상 특수문자 포함" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">비밀번호 확인</label>
                    <input type="password" id="confirm-password" placeholder="비밀번호 재입력" required>
                </div>
                <div class="input-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                <div style="text-align: left; margin-bottom: 20px; font-size: 0.85rem; color: #7f8c8d;">
                    <input type="checkbox" id="terms" required> 
                    <label for="terms">개인정보 수집 및 이용에 동의합니다.</label>
                </div>
                <button type="submit" class="btn btn-primary btn-block">가입하기</button>
            </form>
            <div class="login-footer">
                이미 계정이 있으신가요? <a href="login.html" style="color: #1abc9c; font-weight: bold;">로그인</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
