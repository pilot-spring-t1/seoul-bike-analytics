<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow" style="width: 400px;">

        <h3 class="text-center mb-3">회원가입</h3>

        <form th:action="@{/signup}" method="post">

            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input type="text" name="username" class="form-control" placeholder="아이디 입력">
            </div>

            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="비밀번호 입력">
            </div>

            <div class="mb-3">
                <label class="form-label">비밀번호 확인</label>
                <input type="password" name="confirmPassword" class="form-control" placeholder="비밀번호 확인">
            </div>

            <div class="mb-3">
                <label class="form-label">이메일</label>
                <input type="email" name="email" class="form-control" placeholder="이메일 입력">
            </div>

            <button type="submit" class="btn btn-success w-100">회원가입</button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/}">로그인으로 돌아가기</a>
        </div>

    </div>
</div>

</body>
</html>
