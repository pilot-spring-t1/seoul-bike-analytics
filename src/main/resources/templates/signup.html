<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title>Join Us</title>
	
	<!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	
	<link rel="stylesheet" th:href="@{/css/color.css}">
	<link rel="stylesheet" th:href="@{/css/fonts.css}">
	<link rel="stylesheet" th:href="@{/css/button.css}">
	<style>
		.form-control {
			width: 100%;
			height: 44px;
			border: 1px solid #d7d7d7;
			border-radius: 12px;
			padding: 0 14px;
			font-size: 14px;
			color: #333;
			background: #fff;
			outline: none;
		}
		
		.form-control::placeholder {
			color: #a0a0a0;
		}
		
		.form-control:focus {
			border-color: #24b8a6;
			box-shadow: 0 0 0 3px rgba(36, 184, 166, 0.12);
		}
		
		.agree-wrap {
			display: flex;
			align-items: center;
			gap: 8px;
			margin: 10px 0 24px;
			color: #9a9a9a;
			font-size: 14px;
		}
		
		.agree-wrap input[type="checkbox"] {
			width: 16px;
			height: 16px;
			margin: 0;
		}
		
		.bottom-text {
			text-align: center;
			font-size: 14px;
			color: #A9A9A9;
			font-weight: 800;
		}
		
		.bottom-text a {
			color: #24b8a6;
			text-decoration: none;
			font-weight: 800;
		}
		
		.bottom-text a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body class="bg-dark-green">
	<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
		<div class="card p-4 shadow rounded-4" style="width: 350px;">
			<h3 class="logo-font text-center">JOIN US</h3>
			<h5 class="subtitle-gray-font text-center mb-4">따릉이 데이터 분석 일원이 되어보세요</h5>
			
			<form>
				<div class="mb-3">
					<label class="subtitle-dark-blue-font">아이디</label>
					<input
					  type="text"
					  id="userId"
					  class="form-control"
					  placeholder="4~12자 영문/숫자"
					/>
				</div>
				
				<div class="mb-3">
					<label class="subtitle-dark-blue-font">비밀번호</label>
					<input
					  type="password"
					  id="password"
					  class="form-control"
					  placeholder="8자 이상 특수문자 포함"
					/>
				</div>
				
				<div class="mb-3">
					<label class="subtitle-dark-blue-font">비밀번호 확인</label>
					<input
					  type="password"
					  id="passwordCheck"
					  class="form-control"
					  placeholder="비밀번호 재입력"
					/>
				</div>
				
				<div class="mb-3">
					<label class="subtitle-dark-blue-font">이메일</label>
					<input
					  type="email"
					  id="email"
					  class="form-control"
					  placeholder="example@email.com"
					/>
				</div>
				
				<label class="subtitle-gray-font text-center mb-4">
					<input type="checkbox" />
					<span>개인정보 수집 및 이용에 동의합니다.</span>
				</label>
				
				<button type="submit" class="ok-button">가입하기</button>
				
				<div class="bottom-text mt-3">
					이미 계정이 있으신가요?
					<a th:href="@{/}">로그인</a>
				</div>
			</form>
		</div>
	</div>
</body>
</html>
