<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
	<title>따릉이 분석 데이터센터</title>
    <title>따릉이 분석 대시보드</title>
    
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/card.css}">
    
    <style>
    	.menu {
			list-style: none;
			padding-top: 18px;
			margin: 0;
			padding: 0;
		}
		
		.menu li {
			height: 60px;
			display: flex;
			align-items: center;
			padding: 0 26px;
			font-size: 18px;
			color: #f5f7fa;
			cursor: pointer;
		}
		
		.menu li span.icon {
			width: 28px;
			display: inline-block;
			margin-right: 12px;
			font-size: 22px;
		}
		
		.menu li.active {
			background-color: #37506a;
			color: #19c8af;
		}
		
		.menu li.logout {
			border-top: 1px solid rgba(255,255,255,0.12);
			margin-top: 4px;
		}
    </style>
</head>
<body class="bg" style="margin:0; padding:0;">
    <nav style="
    	position: fixed;
    	width: 300px;
    	height: 100%;
    	background-color: #2C3E50;
    	color: white;
    	padding-top: 20px;
    	box-sizing: border-box;">
        <h2 class="logo-font text-center" style="padding: 0 0 0 30px">SEOUL BIKE</h2>
        <ul class="menu" style="margin: 0; padding: 0;">
        	<li class="active">
        		<a href="/dashboard" style="color: white; text-decoration: none;"><span class="icon">📊</span>종합 분석</a>
        	</li>
			<li>
				<a href="dashboard-detail.html" style="color: white; text-decoration: none;"><span class="icon">🔍</span>상세 분석</a>
			</li>
			<li>
				<a href="dashboard-map.html" style="color: white; text-decoration: none;"><span class="icon">🗺️</span>지역별 지도</a>
			</li>
			<li>
				<a href="/data-center" style="color: white; text-decoration: none;"><span class="icon">📁</span>데이터 센터</a>
			</li>
			<li class="logout">
				<a href="login.html" style="color: white; text-decoration: none;"><span class="icon">🔒</span>로그아웃</a>
			</li>
        </ul>
    </nav>

    <div style="margin-left: 300px; padding: 0; box-sizing: border-box;">
    	<!-- 상단 카드 -->
	    <div class="card" style="
	        width: 100%;
	        height: 30px;
	        padding: 20px 0 20px 0;
	        margin: 0 0 20px 0;
	        box-shadow: 0 4px 6px -4px rgba(0, 0, 0, 0.3);
	        background-color: white;
	        display: flex;
	        align-items: center;
	        justify-content: flex-end;
	    ">
	    	<span style="margin-right: 20px;">반갑습니다, <b>관리자</b>님</span>
            <select id="lang-select" style="margin-right: 20px;">
                <option value="ko">KR</option>
                <option value="en">EN</option>
            </select>
	    </div>

        <section class="summary-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 0 20px 0 20px">
	        <div class="card p-4 shadow rounded-4 content-card"><h3>오늘 대여</h3><p>12,450 건</p></div>
	        <div class="card p-4 shadow rounded-4 content-card"><h3>이번 달 누적</h3><p>350,200 건</p></div>
	        <div class="card p-4 shadow rounded-4 content-card"><h3>활성 대여소</h3><p>2,500 개</p></div>
	    </section>
	    
	    <div class="card  p-4 shadow rounded-4 content-card" style="margin: 50px 20px 0 20px">
            <h3>2025년 월별 이용 추이</h3>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard-main.js"></script>
</body>
</html>
