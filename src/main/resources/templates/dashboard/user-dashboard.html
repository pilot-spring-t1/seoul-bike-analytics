<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="#{dashboard.title}">따릉이 분석 대시보드</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/highcharts/highcharts.js"></script>
<script src="/js/highcharts/exporting.js"></script>

<link rel="stylesheet" th:href="@{/css/color.css}">
<link rel="stylesheet" th:href="@{/css/fonts.css}">
<link rel="stylesheet" th:href="@{/css/card.css}">


<style>
    .menu {
			list-style: none;
			padding-top: 18px;
			margin: 0;
			padding: 0;
		}
		
		.menu li {
			height: 60px;
			display: flex;
			align-items: center;
			padding: 0 26px;
			cursor: pointer;
		}
		
		.menu li span.icon {
			width: 28px;
			display: inline-block;
			margin-right: 12px;
			font-size: 22px;
		}
		
		.menu li.active {
			background-color: #37506a;
			color: #19c8af;
		}
		
		.menu li.notice {
			border-top: 1px solid rgba(255,255,255,0.12);
			margin-top: 4px;
		}
</style>
</head>
<body class="bg" style="margin: 0; padding: 0;">
  <nav style="
    	position: fixed;
    	width: 300px;
    	height: 100%;
    	background-color: #2C3E50;
    	color: white;
    	padding-top: 20px;
    	box-sizing: border-box;">
      <h2 class="logo-font text-center" style="padding: 0 0 0 30px" th:text="#{dashboard.logo}">SEOUL BIKE</h2>
      <ul class="menu" style="margin: 0; padding: 0;">
        <li class="active">
        	<a th:href="@{/dashboard}" class="menu-font-selected" style="text-decoration: none;"><span class="icon">📊</span><span
					  th:text="#{dashboard.menu.overview}">종합 분석</span></a>
        </li>
        <li>
          <a th:href="@{/dashboard-detail}" class="menu-font" style="text-decoration: none;"><span class="icon">🔍</span><span
					th:text="#{dashboard.menu.detail}">상세 분석</span></a>
        </li>
        <li>
          <a th:href="@{/dashboard-map}" class="menu-font" style="text-decoration: none;"><span class="icon">🗺️</span><span
					th:text="#{dashboard.menu.map}">지역별 지도</span></a>
        </li>
        <li>
          <a th:href="@{/data-center}" class="menu-font" style="text-decoration: none;"><span class="icon">📁</span><span
					th:text="#{dashboard.menu.dataCenter}">데이터 센터</span></a>
        </li>
        <li class="notice">
          <a th:href="@{/notifications}" class="menu-font" style="text-decoration: none;"><span class="icon">🔔</span><span
					th:text="#{dashboard.menu.notifications}">알림 내역</span></a>
        </li>
        <li>
          <a th:href="@{/login}" class="menu-font" style="text-decoration: none;"><span class="icon">🔒</span><span
					th:text="#{dashboard.menu.logout}">로그아웃</span></a>
        </li>
      </ul>
    </nav>

	<div style="margin-left: 300px; padding: 0; box-sizing: border-box;">
		<div class="card"
			style="width: 100%; height: 30px; padding: 20px 0 20px 0; margin: 0 0 20px 0; box-shadow: 0 4px 6px -4px rgba(0, 0, 0, 0.3); background-color: white; display: flex; align-items: center; justify-content: flex-end;">

			<span style="margin-right: 20px;"
				th:utext="#{dashboard.welcome('관리자')}"> <!-- th:utext="#{dashboard.welcome(${userName})}" -->
				반갑습니다, <b>관리자</b>님
			</span>

			<form method="get" style="margin: 0; margin-right: 20px;">
				<select name="lang" onchange="this.form.submit()">
					<option value="ko" th:selected="${#locale.language == 'ko'}"
						th:text="#{language.korean}">KR</option>
					<option value="en" th:selected="${#locale.language == 'en'}"
						th:text="#{language.english}">EN</option>
				</select>
			</form>
		</div>

		<section class="summary-grid"
			style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 0 20px 0 20px">
			<div class="card p-4 shadow rounded-4 content-card">
				<h3 th:text="#{dashboard.card.totalUses}">총 이용 건수</h3>
				<p th:text="#{dashboard.unit.count(${#numbers.formatInteger(summary.totalUses, 3, 'COMMA')})}"></p>
			</div>
			<div class="card p-4 shadow rounded-4 content-card">
				<h3 th:text="#{dashboard.card.totalDistance}">총 이동 거리</h3>
				<p th:text="#{dashboard.unit.km(${#numbers.formatDecimal(summary.totalDistance, 1, 'COMMA', 0, 'POINT')})}">총 이동 거리</p>
			</div>
			<div class="card p-4 shadow rounded-4 content-card">
				<h3 th:text="#{dashboard.card.totalUsageMinute}">총 이용 시간</h3>
				<p th:text="#{dashboard.unit.minute(${#numbers.formatInteger(summary.totalUsageMinute, 3, 'COMMA')})}"></p>
			</div>
		</section>

		<div class="card p-4 shadow rounded-4 content-card"
			style="margin: 50px 20px 0 20px">
			<h3 th:text="#{dashboard.chart.monthly.title}">2025년 월별 이용 추이</h3>
			<div id="monthlyUsageChart" style="width: 100%; height: 400px;"></div>
		</div>
	</div>

	<script th:inline="javascript">
    console.log("Highcharts test:", window.Highcharts);

    const chartTitle = /*[[#{dashboard.chart.monthly.title}]]*/ '2025년 월별 자전거 이용 추이';
    const yAxisTitle = /*[[#{dashboard.chart.yAxis.uses}]]*/ '이용 건수';
    const seriesName = /*[[#{dashboard.chart.series.uses}]]*/ '이용 건수';
    const alertMessage = /*[[#{dashboard.chart.error.monthly}]]*/ '월별 데이터를 불러오지 못했습니다.';
    const monthCategories = [
        /*[[#{dashboard.month.1}]]*/ '1월',
        /*[[#{dashboard.month.2}]]*/ '2월',
        /*[[#{dashboard.month.3}]]*/ '3월',
        /*[[#{dashboard.month.4}]]*/ '4월',
        /*[[#{dashboard.month.5}]]*/ '5월',
        /*[[#{dashboard.month.6}]]*/ '6월',
        /*[[#{dashboard.month.7}]]*/ '7월',
        /*[[#{dashboard.month.8}]]*/ '8월',
        /*[[#{dashboard.month.9}]]*/ '9월',
        /*[[#{dashboard.month.10}]]*/ '10월',
        /*[[#{dashboard.month.11}]]*/ '11월',
        /*[[#{dashboard.month.12}]]*/ '12월'
    ];

    $(function () {
        $.ajax({
            url: '/api/bike/monthly-usage?year=2025',
            method: 'GET',
            success: function (response) {
                console.log(response);

                const monthData = new Array(12).fill(0);

                response.forEach(item => {
                    monthData[item.month - 1] = item.totalUses;
                });

                Highcharts.chart('monthlyUsageChart', {
                    chart: {
                        type: 'spline'
                    },
                    title: {
                        text: chartTitle
                    },
                    xAxis: {
                        categories: monthCategories
                    },
                    yAxis: {
                        title: {
                            text: yAxisTitle
                        }
                    },
                    tooltip: {
                        valueSuffix: ''
                    },
                    series: [{
                        name: seriesName,
                        data: monthData
                    }]
                });
            },
            error: function (xhr, status, error) {
                console.error("에러 발생:", error);
                console.log(xhr.responseText);
                alert(alertMessage);
            }
        });
    });
</script>

</body>
</html>
