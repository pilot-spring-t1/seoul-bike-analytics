<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title th:text="#{dashboard.title}">따릉이 분석 대시보드</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/highcharts/highcharts.js"></script>
<script src="/js/highcharts/exporting.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/notification.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" th:href="@{/css/color.css}">
<link rel="stylesheet" th:href="@{/css/fonts.css}">
<link rel="stylesheet" th:href="@{/css/card.css}">


<style>
	* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { display: flex; height: 100vh; overflow: hidden; }
	#sidebar { width: 260px; display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar h2 { height: 100px; display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #sidebar ul { list-style: none; padding: 20px 0; }
    #sidebar ul li a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; }
    #sidebar ul li.active a { background: #1abc9c; color: white; font-weight: bold; }
	#main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
	header { height: 60px; background: white; display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
	.container { flex: 1; padding: 30px; overflow-y: auto; }
	
	.notice {
		border-top: 2px solid rgba(255,255,255,0.12);
		margin-top: 4px;
	}
</style>
</head>
<body class="bg-admin">
	<input type="hidden" id="memberId" th:value="${memberId}"> <!-- 멤버 지정 -->
    <nav id="sidebar" class="menu-admin-color">
	    <h2 class="logo-font" th:text="#{dashboard.logo}">SEOUL BIKE</h2>
	    <ul>
		    <li class="active"><a th:href="@{/admin/dashboard}">📊 <span th:text="#{dashboard.menu.overview}">종합 분석</span></a></li>
            <li><a th:href="@{/admin/detail}">🔍 <span th:text="#{dashboard.menu.detail}">상세 분석</span></a></li>
		    <li><a th:href="@{/admin/dashboard-map}">🗺️ <span th:text="#{dashboard.menu.map}">지역별 지도</span></a></li>
		    <li><a th:href="@{/admin/data-center}">📁 <span th:text="#{dashboard.menu.dataCenter}">자료실</span></a></li>
		    <li class="notice"><a th:href="@{/admin/notifications}"
				style="position: relative;"> 🔔 <span
					th:text="#{dashboard.menu.notifications}">알림 내역</span> <span
					id="notiBadge"
					style="position: absolute; top: 8px; right: 15px; background: #e53935; color: white; border-radius: 50%; min-width: 20px; height: 20px; line-height: 20px; text-align: center; font-size: 11px; font-weight: bold; padding: 0 5px; display: none;">
						0 </span>
			</a></li>
            <li><a th:href="@{/admin/members/search}">👤 <span th:text="#{dashboard.menu.members}">회원 관리</span></a></li>
            <li><a th:href="@{/admin/contents}">📁 콘텐츠 관리</a></li>
            <li><a th:href="@{/admin/logs/list}">📜 <span th:text="#{dashboard.menu.logs}">로그 관리</span></a></li>
			<li><a href="#">⚙️ <span th:text="#{dashboard.menu.settings}">시스템 설정</span></a></li>
            <li><a th:href="@{/members/login}">🔒 <span th:text="#{dashboard.menu.logout}">로그아웃</span></a></li>
	    </ul>
    </nav>

	<div id="main-content">
		<header>
			<span style="margin-right: 20px;" class="subtitle-dark-blue-font"
				th:utext="#{dashboard.welcome('관리자')}"> <!-- th:utext="#{dashboard.welcome(${userName})}" -->
				반갑습니다, <b>관리자</b>님
			</span>
			
			<form method="get" style="margin: 0; margin-right: 10px;">
				<select name="lang" onchange="this.form.submit()">
					<option value="ko" th:selected="${#locale.language == 'ko'}"
						th:text="#{language.korean}">KR</option>
					<option value="en" th:selected="${#locale.language == 'en'}"
						th:text="#{language.english}">EN</option>
				</select>
			</form>
		</header>

		<main class="container">
			<section class="summary-grid"
				style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 0 20px 0 20px">
				<div class="card p-4 shadow rounded-4 content-card">
					<h3 th:text="#{dashboard.card.totalUses}">총 이용 건수</h3>
					<p th:text="#{dashboard.unit.count(${#numbers.formatInteger(summary.totalUses, 3, 'COMMA')})}"></p>
				</div>
				<div class="card p-4 shadow rounded-4 content-card">
					<h3 th:text="#{dashboard.card.totalDistance}">총 이동 거리</h3>
					<p th:text="#{dashboard.unit.km(${#numbers.formatDecimal(summary.totalDistance, 1, 'COMMA', 0, 'POINT')})}">총 이동 거리</p>
				</div>
				<div class="card p-4 shadow rounded-4 content-card">
					<h3 th:text="#{dashboard.card.totalUsageMinute}">총 이용 시간</h3>
					<p th:text="#{dashboard.unit.minute(${#numbers.formatInteger(summary.totalUsageMinute, 3, 'COMMA')})}"></p>
				</div>
			</section>
	
			<div class="card p-4 shadow rounded-4 content-card"
				style="margin: 50px 20px 0 20px">
				<h3 th:text="#{dashboard.chart.monthly.title}">2025년 월별 이용 추이</h3>
				<div id="monthlyUsageChart" style="width: 100%; height: 400px;"></div>
			</div>
		</main>
	</div>

	<script th:inline="javascript">
    console.log("Highcharts test:", window.Highcharts);

    const chartTitle = /*[[#{dashboard.chart.monthly.title}]]*/ '2025년 월별 자전거 이용 추이';
    const yAxisTitle = /*[[#{dashboard.chart.yAxis.uses}]]*/ '이용 건수';
    const seriesName = /*[[#{dashboard.chart.series.uses}]]*/ '이용 건수';
    const alertMessage = /*[[#{dashboard.chart.error.monthly}]]*/ '월별 데이터를 불러오지 못했습니다.';
    const monthCategories = [
        /*[[#{dashboard.month.1}]]*/ '1월',
        /*[[#{dashboard.month.2}]]*/ '2월',
        /*[[#{dashboard.month.3}]]*/ '3월',
        /*[[#{dashboard.month.4}]]*/ '4월',
        /*[[#{dashboard.month.5}]]*/ '5월',
        /*[[#{dashboard.month.6}]]*/ '6월',
        /*[[#{dashboard.month.7}]]*/ '7월',
        /*[[#{dashboard.month.8}]]*/ '8월',
        /*[[#{dashboard.month.9}]]*/ '9월',
        /*[[#{dashboard.month.10}]]*/ '10월',
        /*[[#{dashboard.month.11}]]*/ '11월',
        /*[[#{dashboard.month.12}]]*/ '12월'
    ];

    $(function () {
        $.ajax({
            url: '/api/bike/monthly-usage?year=2025',
            method: 'GET',
            success: function (response) {
                console.log(response);

                const monthData = new Array(12).fill(0);

                response.forEach(item => {
                    monthData[item.month - 1] = item.totalUses;
                });

                Highcharts.chart('monthlyUsageChart', {
                    chart: {
                        type: 'spline'
                    },
                    title: {
                        text: chartTitle
                    },
                    xAxis: {
                        categories: monthCategories
                    },
                    yAxis: {
                        title: {
                            text: yAxisTitle
                        }
                    },
                    tooltip: {
                        valueSuffix: ''
                    },
                    series: [{
                        name: seriesName,
                        data: monthData
                    }]
                });
            },
            error: function (xhr, status, error) {
                console.error("에러 발생:", error);
                console.log(xhr.responseText);
                alert(alertMessage);
            }
        });
    });
</script>

</body>
</html>
