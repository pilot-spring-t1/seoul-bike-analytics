<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 정보 수정 | SEOUL BIKE</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/button.css}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .edit-container { background: white; width: 500px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #334155; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
        .form-control:focus { border-color: #1abc9c; }
        .readonly-input { background: #f8fafc; color: #64748b; cursor: not-allowed; }
        .btn-area { display: flex; gap: 10px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="edit-container">
        <h2 style="margin-bottom: 30px; color: #1e293b;">👤 회원 정보 수정</h2>
        
        <form th:action="@{/admin/members/update}" th:object="${member}" method="post">
            <input type="hidden" th:field="*{memberId}">

            <div class="form-group">
                <label>아이디</label>
                <input type="text" th:field="*{loginId}" class="form-control readonly-input" readonly>
            </div>

            <div class="form-group">
                <label>이름</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <div class="form-group">
                <label>성별</label>
                <select th:field="*{gender}" class="form-control">
                    <option value="M">남성</option>
                    <option value="F">여성</option>
                </select>
            </div>

            <div class="form-group">
                <label>나이</label>
                <input type="number" th:field="*{age}" class="form-control" required>
            </div>

            <div class="form-group">
                <label>권한</label>
                <select th:field="*{role}" class="form-control">
                    <option value="ROLE_USER">일반회원</option>
                    <option value="ROLE_ADMIN">관리자</option>
                </select>
            </div>

            <div class="btn-area">
                <button type="submit" class="ok-button" style="flex: 2; height: 45px;">수정 완료</button>
                <button type="button" class="action-btn" style="flex: 1;" onclick="history.back()">취소</button>
            </div>
        </form>
    </div>
</body>
</html>
