<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title th:text="#{detail.page.title}">따릉이 심층 분석 모드</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/highcharts/highcharts.js"></script>
<script src="/js/highcharts/exporting.js"></script>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/js/notification.js"></script>


<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" th:href="@{/css/color.css}">
<link rel="stylesheet" th:href="@{/css/fonts.css}">
<link rel="stylesheet" th:href="@{/css/card.css}">

<style>
/* CSS 스타일 유지 */
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
	font-family: 'Pretendard', sans-serif;
}

body {
	display: flex;
	height: 100vh;
	overflow: hidden;
}

#sidebar {
	width: 260px;
	display: flex;
	flex-direction: column;
	flex-shrink: 0;
}

#main-content {
	flex-grow: 1;
	display: flex;
	flex-direction: column;
	min-width: 0;
}

header {
	height: 60px;
	background: white;
	display: flex;
	align-items: center;
	justify-content: flex-end;
	padding: 0 30px;
	box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
}

.container {
	flex: 1;
	padding: 30px;
	overflow-y: auto;
}

.panel {
	background: #f9f9f9;
	border-radius: 16px;
	box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.03);
}

.filter-panel {
	display: flex;
	align-items: center;
	gap: 20px;
	padding: 20px;
	margin-bottom: 18px;
	min-height: 90px;
}

.filter-left {
	display: flex;
	align-items: end;
	gap: 10px;
	min-width: 230px;
	flex-wrap: wrap;
}

.filter-group label {
	display: block;
	font-size: 13px;
	color: #61707d;
	margin-bottom: 8px;
	font-weight: 700;
}

.filter-group select, .filter-group input[type="date"], .filter-group input[type="text"]
	{
	height: 36px;
	border: 1px solid #d8dddd;
	border-radius: 6px;
	padding: 0 10px;
	font-size: 13px;
	background: #fff;
	color: #2a3d51;
}

.office-search-group {
	position: relative;
	min-width: 260px;
}

.office-search-group input[type="text"] {
	width: 260px;
}

.office-suggestion-list {
	position: absolute;
	top: calc(100% + 6px);
	left: 0;
	width: 260px;
	background: #fff;
	border: 1px solid #d8dddd;
	border-radius: 8px;
	box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
	max-height: 220px;
	overflow-y: auto;
	z-index: 20;
	display: none;
}

.office-suggestion-item {
	padding: 10px 12px;
	font-size: 13px;
	color: #2a3d51;
	cursor: pointer;
	border-bottom: 1px solid #f0f2f2;
}

.office-suggestion-item:hover {
	background: #f4fbfa;
}

.apply-btn {
	height: 36px;
	padding: 0 18px;
	border: none;
	border-radius: 7px;
	background: #22bda9;
	color: #fff;
	font-size: 13px;
	font-weight: 700;
	cursor: pointer;
}

.summary-row {
	display: grid;
	grid-template-columns: repeat(4, 1fr);
	gap: 14px;
	margin-bottom: 20px;
}

.summary-card {
	padding: 18px 20px;
	min-height: 94px;
}

.summary-card .label {
	font-size: 13px;
	color: #8a959d;
	margin-bottom: 8px;
	font-weight: 700;
}

.summary-card .value {
	font-size: 25px;
	font-weight: 800;
	color: #2d4258;
}

.summary-card .value.green {
	color: #2ec86e;
}

.chart-topline {
	display: flex;
	align-items: center;
	justify-content: flex-start;
	margin: 10px 0 14px;
}

.tabs {
	display: flex;
	gap: 8px;
	align-items: center;
}

.tab {
	border: 1px solid #dfe4e4;
	background: #f5f5f5;
	color: #75808a;
	border-radius: 999px;
	height: 32px;
	padding: 0 16px;
	font-size: 12px;
	font-weight: 700;
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: pointer;
	user-select: none;
	transition: all 0.15s ease;
}

.tab.active {
	background: #23bea9;
	color: #fff;
	border-color: #23bea9;
}

.chart-panel {
	position: relative;
	padding: 18px 18px 18px;
	overflow: hidden;
}

.chart-title-left {
	font-size: 16px;
	font-weight: 800;
	color: #2d4258;
}

.fake-chart-wrap {
	margin-top: 8px;
	border-radius: 12px;
	overflow: hidden;
	background: #fcfcfc;
	height: 330px;
	position: relative;
	border: 1px solid #ececec;
}

#analysisChart {
	width: 100%;
	height: 100%;
	position: relative;
}

.chart-empty-message {
	position: absolute;
	inset: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	color: #7d878f;
	font-size: 14px;
	font-weight: 700;
	pointer-events: none;
	background: transparent;
	z-index: 5;
}

@media ( max-width : 1200px) {
	.summary-row {
		grid-template-columns: 1fr;
	}
	.filter-panel {
		flex-direction: column;
		align-items: stretch;
	}
}
</style>
</head>
<body class="bg">
    <input type="hidden" id="memberId" th:value="${memberId}">

    <div th:replace="~{fragment/sidebar :: sidebar('detail')}"></div>

	<div id="main-content">
        <div th:replace="~{fragment/header :: header('dashboard.welcome', ${userName})}"></div>

		<main class="container">
			<section class="panel filter-panel">
				<div class="filter-left">
					<div class="filter-group office-search-group">
						<label th:text="#{detail.filter.office}">대여소 선택</label> <input
							type="text" id="officeKeyword"
							th:placeholder="#{detail.filter.officePlaceholder}"
							placeholder="전체 대여소 또는 대여소명 검색" autocomplete="off" /> <input
							type="hidden" id="officeSelected" value="" />
						<div id="officeSuggestionList" class="office-suggestion-list"></div>
					</div>

					<div class="filter-group">
						<label th:text="#{detail.filter.startDate}">시작일</label> <input
							type="date" id="startDate" value="2025-01-01" min="2025-01-01"
							max="2025-12-31" />
					</div>

					<div class="filter-group">
						<label th:text="#{detail.filter.endDate}">종료일</label> <input
							type="date" id="endDate" value="2025-12-31" min="2025-01-01"
							max="2025-12-31" />
					</div>

					<button class="apply-btn" id="applyFilterBtn" type="button"
						th:text="#{detail.filter.apply}">필터 적용</button>
				</div>
			</section>

			<section class="summary-row">
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgDistance}">평균
						이동거리</div>
					<div class="value" id="avgDistanceValue">0 km</div>
				</div>
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgUsageMinute}">평균
						이용시간</div>
					<div class="value" id="avgUsageMinuteValue">0 분</div>
				</div>
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgDailyUses}">하루
						평균 이용 건수</div>
					<div class="value green" id="avgDailyUsesValue">0 건</div>
				</div>
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgSpeed}">평균
						이동속도</div>
					<div class="value green" id="avgSpeedValue">0 km/h</div>
				</div>
			</section>

			<div class="chart-topline">
				<div class="tabs">
					<div class="tab active" data-type="age">
						👤 <span th:text="#{detail.tab.age}">연령대별</span>
					</div>
					<div class="tab" data-type="genderCode">
						🚻 <span th:text="#{detail.tab.gender}">성별</span>
					</div>
					<div class="tab" data-type="ticket">
						🎟️ <span th:text="#{detail.tab.ticket}">이용권별</span>
					</div>
				</div>
			</div>

			<section class="panel chart-panel">
				<div class="chart-title-row">
					<div class="chart-title-left" th:text="#{detail.chart.title.age}">👤
						연령대별 이용량 추이</div>
				</div>

				<div class="fake-chart-wrap">
					<div id="analysisChart"></div>
				</div>
			</section>
		</main>
	</div>

	<script th:inline="javascript">
$(function () {
    // I18N 및 차트 관련 스크립트 로직 유지
	const i18n = {
		ageCategories: [
			/*[[#{detail.age.teens}]]*/ '~10대',
			/*[[#{detail.age.twenties}]]*/ '20대',
			/*[[#{detail.age.thirties}]]*/ '30대',
			/*[[#{detail.age.forties}]]*/ '40대',
			/*[[#{detail.age.fifties}]]*/ '50대',
			/*[[#{detail.age.sixties}]]*/ '60대',
			/*[[#{detail.age.seventiesPlus}]]*/ '70대이상',
			/*[[#{detail.age.etc}]]*/ '기타'
		],
		genderCategories: [
			/*[[#{detail.gender.female}]]*/ '여성',
			/*[[#{detail.gender.male}]]*/ '남성',
			/*[[#{detail.gender.etc}]]*/ '기타/미지정'
		],
		unitKm: /*[[#{detail.unit.km}]]*/ 'km',
		unitMinute: /*[[#{detail.unit.minute}]]*/ '분',
		unitCount: /*[[#{detail.unit.count}]]*/ '건',
		unitKmh: /*[[#{detail.unit.kmh}]]*/ 'km/h',
		searchNoResult: /*[[#{detail.search.noResult}]]*/ '검색 결과가 없습니다.',
		alertInvalidDate: /*[[#{detail.alert.invalidDate}]]*/ '시작일은 종료일보다 클 수 없습니다.',
		chartTitleAge: /*[[#{detail.chart.title.age}]]*/ '👤 연령대별 이용량 추이',
		chartTitleGender: /*[[#{detail.chart.title.gender}]]*/ '🚻 성별 이용량 추이',
		chartTitleTicket: /*[[#{detail.chart.title.ticket}]]*/ '🎟️ 이용권별 이용 비율',
		chartEmptyAge: /*[[#{detail.chart.empty.age}]]*/ '연령대별 데이터를 불러오지 못했습니다.',
		chartEmptyGender: /*[[#{detail.chart.empty.gender}]]*/ '성별 데이터를 불러오지 못했습니다.',
		chartEmptyTicket: /*[[#{detail.chart.empty.ticket}]]*/ '이용권별 데이터를 불러오지 못했습니다.',
		yAxisUseCount: /*[[#{detail.chart.yAxis.useCount}]]*/ '대여 건수',
		seriesUseCount: /*[[#{detail.chart.series.useCount}]]*/ '대여 건수',
		seriesTicketRatio: /*[[#{detail.chart.series.ticketRatio}]]*/ '이용권 비율'
	};

	const ageCategoryKeys = ['~10대', '20대', '30대', '40대', '50대', '60대', '70대이상', '기타'];
	const genderCategoryKeys = ['여성', '남성', '기타/미지정'];

	const ageCategories = i18n.ageCategories;
	const genderCategories = i18n.genderCategories;

	const ticketLabelMap = {
		'정기권': /*[[#{detail.ticket.regular}]]*/ '정기권',
		'일일권': /*[[#{detail.ticket.daily}]]*/ '일일권',
		'일일권(비회원)': /*[[#{detail.ticket.dailyNonMember}]]*/ '일일권(비회원)',
		'가족권': /*[[#{detail.ticket.family}]]*/ '가족권',
		'가족권(2시간)': /*[[#{detail.ticket.family2h}]]*/ '가족권(2시간)',
		'가족권(3시간)': /*[[#{detail.ticket.family3h}]]*/ '가족권(3시간)',
		'일일권(3시간)': /*[[#{detail.ticket.daily3h}]]*/ '일일권(3시간)',
		'일일권(비회원 3시간)': /*[[#{detail.ticket.dailyNonMember3h}]]*/ '일일권(비회원 3시간)'
	};

	let officeSearchTimer = null;
	let officeSearchXhr = null;
	let chartRequestXhr = null;

	function getFilterValues() {
		return {
			officeKeyword: $('#officeKeyword').val().trim(),
			officeSelected: $('#officeSelected').val().trim(),
			startDate: $('#startDate').val(),
			endDate: $('#endDate').val()
		};
	}

	function formatNumber(value, fractionDigits = 0) {
		return Number(value || 0).toLocaleString(
			/*[[${#locale.language}]]*/ 'ko',
			{
				minimumFractionDigits: fractionDigits,
				maximumFractionDigits: fractionDigits
			}
		);
	}

	function getTranslatedTicketLabel(label) {
		return ticketLabelMap[label] ?? label;
	}

	function renderSummary(summary) {
		$('#avgDistanceValue').text(formatNumber(summary.avgDistance, 2) + ' ' + i18n.unitKm);
		$('#avgUsageMinuteValue').text(formatNumber(summary.avgUsageMinute, 2) + ' ' + i18n.unitMinute);
		$('#avgDailyUsesValue').text(formatNumber(summary.avgDailyUses, 2) + ' ' + i18n.unitCount);
		$('#avgSpeedValue').text(formatNumber(summary.avgSpeed, 2) + ' ' + i18n.unitKmh);
	}

	function loadSummary() {
		const filters = getFilterValues();

		$.ajax({
			url: '/api/analysis/summary',
			method: 'GET',
			data: {
				startDate: filters.startDate,
				endDate: filters.endDate,
				keyword: filters.officeSelected
			},
			success: function (response) {
				renderSummary(response);
			},
			error: function (xhr, status, error) {
				console.error('요약 카드 데이터 조회 실패:', error);
			}
		});
	}

	function clearOverlayMessage() {
		$('#analysisChart').find('.chart-empty-message').remove();
	}

	function showOverlayMessage(message) {
		clearOverlayMessage();
		$('#analysisChart').append('<div class="chart-empty-message">' + message + '</div>');
	}

	function setActiveTab(type) {
		$('.tab').removeClass('active');
		$('.tab[data-type="' + type + '"]').addClass('active');
	}

	function hideOfficeSuggestions() {
		$('#officeSuggestionList').hide().empty();
	}

	function renderOfficeSuggestions(offices) {
		const $list = $('#officeSuggestionList');
		$list.empty();

		if (!offices || offices.length === 0) {
			$list.append('<div class="office-suggestion-empty">' + i18n.searchNoResult + '</div>');
			$list.show();
			return;
		}

		offices.forEach(function (office) {
			$list.append(
				'<div class="office-suggestion-item" data-name="' + office + '">' +
				office +
				'</div>'
			);
		});

		$list.show();
	}

	function renderAgeChart(response) {
		clearOverlayMessage();
		const ageData = new Array(ageCategoryKeys.length).fill(0);
		response.forEach(item => {
			const label = item.label ?? item.LABEL;
			const value = item.value ?? item.VALUE;
			const index = ageCategoryKeys.indexOf(label);
			if (index !== -1) ageData[index] = Number(value);
		});

		Highcharts.chart('analysisChart', {
			accessibility: { enabled: false },
			chart: { type: 'column', backgroundColor: '#fcfcfc' },
			title: { text: null },
			xAxis: { categories: ageCategories },
			yAxis: { title: { text: i18n.yAxisUseCount } },
			series: [{ name: i18n.seriesUseCount, data: ageData, color: '#25bea9' }]
		});
		$('.chart-title-left').text(i18n.chartTitleAge);
	}

	function renderGenderChart(response) {
		clearOverlayMessage();
		const genderData = new Array(genderCategoryKeys.length).fill(0);
		response.forEach(item => {
			const label = item.label ?? item.LABEL;
			const value = item.value ?? item.VALUE;
			const index = genderCategoryKeys.indexOf(label);
			if (index !== -1) genderData[index] = Number(value);
		});

		Highcharts.chart('analysisChart', {
			accessibility: { enabled: false },
			chart: { type: 'column', backgroundColor: '#fcfcfc' },
			title: { text: null },
			xAxis: { categories: genderCategories },
			yAxis: { title: { text: i18n.yAxisUseCount } },
			series: [{ name: i18n.seriesUseCount, data: genderData, color: '#4e9df7' }]
		});
		$('.chart-title-left').text(i18n.chartTitleGender);
	}

	function renderTicketChart(response) {
		clearOverlayMessage();
		const pieData = response.map(item => ({
			name: getTranslatedTicketLabel(item.label ?? item.LABEL),
			y: Number(item.value ?? item.VALUE)
		}));

		Highcharts.chart('analysisChart', {
			accessibility: { enabled: false },
			chart: { type: 'pie', backgroundColor: '#fcfcfc' },
			title: { text: null },
			series: [{ name: i18n.seriesTicketRatio, data: pieData }]
		});
		$('.chart-title-left').text(i18n.chartTitleTicket);
	}

	function requestChart(options) {
		if (chartRequestXhr) chartRequestXhr.abort();
		chartRequestXhr = $.ajax({
			url: options.url,
			method: 'GET',
			data: options.data,
			success: function (response) { options.onSuccess(response); },
			error: function (xhr, status, error) {
				if (status !== 'abort') showOverlayMessage(options.emptyMessage);
			}
		});
	}

	function loadAgeChart() {
		requestChart({
			url: '/api/analysis/age',
			data: { ...getFilterValues(), targetCol: 'USES', calcType: 'SUM' },
			emptyMessage: i18n.chartEmptyAge,
			onSuccess: renderAgeChart
		});
	}

	function loadGenderChart() {
		requestChart({
			url: '/api/analysis/gender',
			data: getFilterValues(),
			emptyMessage: i18n.chartEmptyGender,
			onSuccess: renderGenderChart
		});
	}

	function loadTicketChart() {
		requestChart({
			url: '/api/analysis/ticket',
			data: getFilterValues(),
			emptyMessage: i18n.chartEmptyTicket,
			onSuccess: renderTicketChart
		});
	}

	$('#officeKeyword').on('input', function () {
		const keyword = $(this).val().trim();
		$('#officeSelected').val('');
		clearTimeout(officeSearchTimer);
		if (keyword === '') { hideOfficeSuggestions(); return; }
		officeSearchTimer = setTimeout(() => {
			if (officeSearchXhr) officeSearchXhr.abort();
			officeSearchXhr = $.ajax({
				url: '/api/analysis/search',
				data: { keyword: keyword },
				success: renderOfficeSuggestions
			});
		}, 300);
	});

	$(document).on('click', '.office-suggestion-item', function () {
		const officeName = $(this).data('name');
		$('#officeKeyword').val(officeName);
		$('#officeSelected').val(officeName);
		hideOfficeSuggestions();
	});

	$('#applyFilterBtn').on('click', function () {
		loadSummary();
		const activeType = $('.tab.active').data('type');
		if (activeType === 'age') loadAgeChart();
		else if (activeType === 'ticket') loadTicketChart();
		else if (activeType === 'genderCode') loadGenderChart();
	});

	$('.tab').on('click', function () {
		const type = $(this).data('type');
		setActiveTab(type);
		if (type === 'age') loadAgeChart();
		else if (type === 'ticket') loadTicketChart();
		else if (type === 'genderCode') loadGenderChart();
	});

	loadSummary();
	loadAgeChart();
});

document.addEventListener("DOMContentLoaded", function () {
    const memberId = document.getElementById("memberId")?.value;
    if (memberId) {
        initNotification(memberId);
    }
});
</script>
</body>
</html>
