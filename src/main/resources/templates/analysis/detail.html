<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>따릉이 심층 분석 모드</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/highcharts/highcharts.js"></script>
<script src="/js/highcharts/exporting.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<link rel="stylesheet" th:href="@{/css/color.css}">
<link rel="stylesheet" th:href="@{/css/fonts.css}">
<link rel="stylesheet" th:href="@{/css/card.css}">

<style>
	* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
    body { display: flex; height: 100vh; overflow: hidden; }
	#sidebar { width: 260px; display: flex; flex-direction: column; flex-shrink: 0; }
    #sidebar h2 { height: 100px; display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    #sidebar ul { list-style: none; padding: 20px 0; }
    #sidebar ul li a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; }
    #sidebar ul li.active a { background: #1abc9c; color: white; font-weight: bold; }
	#main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
	header { height: 60px; background: white; display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
	.container { flex: 1; padding: 30px; overflow-y: auto; }

	.notice {
		border-top: 2px solid rgba(255,255,255,0.12);
		margin-top: 4px;
	}
.panel {
	background: #f9f9f9;
	border-radius: 16px;
	box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.03);
}

.filter-panel {
	display: flex;
	align-items: center;
	gap: 20px;
	padding: 20px;
	margin-bottom: 18px;
	min-height: 90px;
}

.filter-left {
	display: flex;
	align-items: end;
	gap: 10px;
	min-width: 230px;
	flex-wrap: wrap;
}

.filter-group label {
	display: block;
	font-size: 13px;
	color: #61707d;
	margin-bottom: 8px;
	font-weight: 700;
}

.filter-group select, .filter-group input[type="date"], .filter-group input[type="text"]
	{
	height: 36px;
	border: 1px solid #d8dddd;
	border-radius: 6px;
	padding: 0 10px;
	font-size: 13px;
	background: #fff;
	color: #2a3d51;
}

.office-search-group {
	position: relative;
	min-width: 260px;
}

.office-search-group input[type="text"] {
	width: 260px;
}

.office-suggestion-list {
	position: absolute;
	top: calc(100% + 6px);
	left: 0;
	width: 260px;
	background: #fff;
	border: 1px solid #d8dddd;
	border-radius: 8px;
	box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
	max-height: 220px;
	overflow-y: auto;
	z-index: 20;
	display: none;
}

.office-suggestion-item {
	padding: 10px 12px;
	font-size: 13px;
	color: #2a3d51;
	cursor: pointer;
	border-bottom: 1px solid #f0f2f2;
}

.office-suggestion-item:last-child {
	border-bottom: none;
}

.office-suggestion-item:hover {
	background: #f4fbfa;
}

.office-suggestion-empty {
	padding: 10px 12px;
	font-size: 13px;
	color: #8a959d;
}

.apply-btn {
	height: 36px;
	padding: 0 18px;
	border: none;
	border-radius: 7px;
	background: #22bda9;
	color: #fff;
	font-size: 13px;
	font-weight: 700;
	cursor: pointer;
}

.summary-row {
	display: grid;
	grid-template-columns: repeat(4, 1fr);
	gap: 14px;
	margin-bottom: 20px;
}

.summary-card {
	padding: 18px 20px;
	min-height: 94px;
}

.summary-card .label {
	font-size: 13px;
	color: #8a959d;
	margin-bottom: 8px;
	font-weight: 700;
}

.summary-card .value {
	font-size: 25px;
	font-weight: 800;
	color: #2d4258;
}

.summary-card .value.green {
	color: #2ec86e;
}

.chart-topline {
	display: flex;
	align-items: center;
	justify-content: flex-start;
	margin: 10px 0 14px;
}

.tabs {
	display: flex;
	gap: 8px;
	align-items: center;
}

.tab {
	border: 1px solid #dfe4e4;
	background: #f5f5f5;
	color: #75808a;
	border-radius: 999px;
	height: 32px;
	padding: 0 16px;
	font-size: 12px;
	font-weight: 700;
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: pointer;
	user-select: none;
	transition: all 0.15s ease;
}

.tab.active {
	background: #23bea9;
	color: #fff;
	border-color: #23bea9;
}

.chart-panel {
	position: relative;
	padding: 18px 18px 18px;
	overflow: hidden;
}

.chart-title-row {
	display: flex;
	justify-content: space-between;
	align-items: center;
	margin-bottom: 8px;
}

.chart-title-left {
	font-size: 16px;
	font-weight: 800;
	color: #2d4258;
}

.fake-chart-wrap {
	margin-top: 8px;
	border-radius: 12px;
	overflow: hidden;
	background: linear-gradient(to right, rgba(0, 0, 0, 0.06) 1px,
		transparent 1px), linear-gradient(to bottom, rgba(0, 0, 0, 0.06) 1px,
		transparent 1px), #fcfcfc;
	background-size: calc(100%/ 24) calc(100%/ 8), calc(100%/ 24)
		calc(100%/ 8), auto;
	height: 330px;
	position: relative;
	border: 1px solid #ececec;
}

#analysisChart {
	width: 100%;
	height: 100%;
	position: relative;
}

.chart-empty-message {
	position: absolute;
	inset: 0;
	display: flex;
	align-items: center;
	justify-content: center;
	color: #7d878f;
	font-size: 14px;
	font-weight: 700;
	pointer-events: none;
	background: transparent;
	z-index: 5;
}

@media ( max-width : 1200px) {
	.summary-row {
		grid-template-columns: 1fr;
	}
	.filter-panel {
		flex-direction: column;
		align-items: stretch;
	}
	.chart-topline {
		flex-direction: column;
		align-items: stretch;
		gap: 10px;
	}
}
</style>
</head>
<body class="bg">
	<input type="hidden" id="memberId" th:value="${memberId}"> <!-- 멤버 지정 -->
	<nav id="sidebar" class="menu-color">
		<h2 class="logo-font" th:text="#{dashboard.logo}">SEOUL BIKE</h2>
		<ul>
			<li><a th:href="@{/dashboard}">📊 <span
					th:text="#{dashboard.menu.overview}">종합 분석</span></a></li>
			<li class="active"><a th:href="@{/detail}">🔍 <span
					th:text="#{dashboard.menu.detail}">상세 분석</span></a></li>
			<li><a th:href="@{/dashboard-map}">🗺️ <span
					th:text="#{dashboard.menu.map}">지역별 지도</span></a></li>
			<li><a th:href="@{/data-center}">📁 <span
					th:text="#{dashboard.menu.dataCenter}">데이터 센터</span></a></li>
			<li class="notice"><a th:href="@{/notifications}"
				style="position: relative;"> 🔔 <span
					th:text="#{dashboard.menu.notifications}">알림 내역</span> <span
					id="notiBadge"
					style="position: absolute; top: 8px; right: 15px; background: #e53935; color: white; border-radius: 50%; min-width: 20px; height: 20px; line-height: 20px; text-align: center; font-size: 11px; font-weight: bold; padding: 0 5px; display: none;">
						0 </span>
			</a></li>
			<li><a th:href="@{/}">🔒 <span
					th:text="#{dashboard.menu.logout}">로그아웃</span></a></li>
		</ul>
	</nav>

	<div id="main-content">
		<header>
			<span style="margin-right: 20px;" class="subtitle-dark-blue-font"
				th:text="#{detail.header.systemNotice}"> 시스템 알림 센터 </span>
			<form method="get" style="margin: 0; margin-right: 10px;">
				<select name="lang" onchange="this.form.submit()">
					<option value="ko" th:selected="${#locale.language == 'ko'}"
						th:text="#{language.korean}">KR</option>
					<option value="en" th:selected="${#locale.language == 'en'}"
						th:text="#{language.english}">EN</option>
				</select>
			</form>
		</header>

		<main class="container">
				<section class="panel filter-panel">
					<div class="filter-left">
						<div class="filter-group office-search-group">
							<label>대여소 선택</label> <input type="text" id="officeKeyword"
								placeholder="전체 대여소 또는 대여소명 검색" autocomplete="off" /> <input
								type="hidden" id="officeSelected" value="" />
							<div id="officeSuggestionList" class="office-suggestion-list"></div>
						</div>
					</div>

					<div class="filter-group">
						<label th:text="#{detail.filter.startDate}">시작일</label> <input
							type="date" id="startDate" value="2025-01-01" min="2025-01-01"
							max="2025-12-31" />
					</div>

					<div class="filter-group">
						<label th:text="#{detail.filter.endDate}">종료일</label> <input
							type="date" id="endDate" value="2025-12-31" min="2025-01-01"
							max="2025-12-31" />
					</div>

					<button class="apply-btn" id="applyFilterBtn" type="button"
						th:text="#{detail.filter.apply}">필터 적용</button>
				</div>
			</section>

			<section class="summary-row">
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgDistance}">평균
						이동거리</div>
					<div class="value" id="avgDistanceValue">0 km</div>
				</div>
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgUsageMinute}">평균
						이용시간</div>
					<div class="value" id="avgUsageMinuteValue">0 분</div>
				</div>
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgDailyUses}">하루
						평균 이용 건수</div>
					<div class="value green" id="avgDailyUsesValue">0 건</div>
				</div>
				<div class="panel summary-card">
					<div class="label" th:text="#{detail.summary.avgSpeed}">평균
						이동속도</div>
					<div class="value green" id="avgSpeedValue">0 km/h</div>
				</div>
			</section>

			<div class="chart-topline">
				<div class="tabs">
					<div class="tab active" data-type="age">
						👤 <span th:text="#{detail.tab.age}">연령대별</span>
					</div>
					<div class="tab" data-type="genderCode">
						🚻 <span th:text="#{detail.tab.gender}">성별</span>
					</div>
					<div class="tab" data-type="ticket">
						🎟️ <span th:text="#{detail.tab.ticket}">이용권별</span>
					</div>
				</div>
			</div>

			<section class="panel chart-panel">
				<div class="chart-title-row">
					<div class="chart-title-left" th:text="#{detail.chart.title.age}">👤
						연령대별 이용량 추이</div>
				</div>

				<div class="fake-chart-wrap">
					<div id="analysisChart"></div>
				</div>
			</section>
		</main>
	</div>

	<script>
$(function () {
	const ageCategories = ['~10대', '20대', '30대', '40대', '50대', '60대', '70대이상', '기타'];
	const genderCategories = ['여성', '남성', '기타/미지정'];

	let officeSearchTimer = null;
	let officeSearchXhr = null;

	function getFilterValues() {
		return {
			officeKeyword: $('#officeKeyword').val().trim(),
			officeSelected: $('#officeSelected').val().trim(),
			startDate: $('#startDate').val(),
			endDate: $('#endDate').val()
		};
	}

	function formatNumber(value, fractionDigits = 0) {
		return Number(value || 0).toLocaleString('ko-KR', {
			minimumFractionDigits: fractionDigits,
			maximumFractionDigits: fractionDigits
		});
	}

	function renderSummary(summary) {
		$('#avgDistanceValue').text(formatNumber(summary.avgDistance, 2) + ' km');
		$('#avgUsageMinuteValue').text(formatNumber(summary.avgUsageMinute, 2) + ' 분');
		$('#avgDailyUsesValue').text(formatNumber(summary.avgDailyUses, 2) + ' 건');
		$('#avgSpeedValue').text(formatNumber(summary.avgSpeed, 2) + ' km/h');
	}

	function loadSummary() {
		const filters = getFilterValues();

		$.ajax({
			url: '/api/analysis/summary',
			method: 'GET',
			data: {
				startDate: filters.startDate,
				endDate: filters.endDate,
				keyword: filters.officeSelected
			},
			success: function (response) {
				console.log('요약 카드 응답 데이터:', response);
				renderSummary(response);
			},
			error: function (xhr, status, error) {
				console.error('요약 카드 데이터 조회 실패:', error);
				console.log(xhr.responseText);
			}
		});
	}

	function clearOverlayMessage() {
		$('#analysisChart').find('.chart-empty-message').remove();
	}

	function showOverlayMessage(message) {
		clearOverlayMessage();
		$('#analysisChart').append('<div class="chart-empty-message">' + message + '</div>');
	}

	function setActiveTab(type) {
		$('.tab').removeClass('active');
		$('.tab[data-type="' + type + '"]').addClass('active');
	}

	function hideOfficeSuggestions() {
		$('#officeSuggestionList').hide().empty();
	}

	function renderOfficeSuggestions(offices) {
		const $list = $('#officeSuggestionList');
		$list.empty();

		if (!offices || offices.length === 0) {
			$list.append('<div class="office-suggestion-empty">검색 결과가 없습니다.</div>');
			$list.show();
			return;
		}

		offices.forEach(function (office) {
			$list.append(
				'<div class="office-suggestion-item" data-name="' + office + '">' +
				office +
				'</div>'
			);
		});

		$list.show();
	}

	function renderAgeChart(response) {
		clearOverlayMessage();

		const ageData = new Array(8).fill(0);

		response.forEach(item => {
			const label = item.label ?? item.LABEL;
			const value = item.value ?? item.VALUE;
			const index = ageCategories.indexOf(label);
			if (index !== -1) {
				ageData[index] = Number(value);
			}
		});

		Highcharts.chart('analysisChart', {
			accessibility: { enabled: false },
			chart: {
				type: 'column',
				backgroundColor: '#fcfcfc',
				spacingTop: 20,
				spacingRight: 20,
				spacingBottom: 20,
				spacingLeft: 20
			},
			title: { text: null },
			credits: { enabled: false },
			exporting: { enabled: false },
			legend: { enabled: false },
			xAxis: {
				categories: ageCategories,
				title: { text: null },
				lineColor: '#dfe4e4',
				tickColor: '#dfe4e4',
				labels: {
					style: {
						color: '#7d878f',
						fontSize: '12px'
					}
				}
			},
			yAxis: {
				title: { text: '대여 건수' },
				gridLineColor: '#e9eeee',
				labels: {
					style: {
						color: '#7d878f',
						fontSize: '12px'
					}
				}
			},
			tooltip: {
				valueSuffix: '건'
			},
			plotOptions: {
				column: {
					borderRadius: 6,
					pointPadding: 0.08,
					groupPadding: 0.1
				}
			},
			series: [{
				name: '대여 건수',
				data: ageData,
				color: '#25bea9'
			}]
		});

		$('.chart-title-left').text('👤 연령대별 이용량 추이');
	}

	function renderGenderChart(response) {
		clearOverlayMessage();

		const genderData = new Array(3).fill(0);

		response.forEach(item => {
			const label = item.label ?? item.LABEL;
			const value = item.value ?? item.VALUE;
			const index = genderCategories.indexOf(label);
			if (index !== -1) {
				genderData[index] = Number(value);
			}
		});

		Highcharts.chart('analysisChart', {
			accessibility: { enabled: false },
			chart: {
				type: 'column',
				backgroundColor: '#fcfcfc',
				spacingTop: 20,
				spacingRight: 20,
				spacingBottom: 20,
				spacingLeft: 20
			},
			title: { text: null },
			credits: { enabled: false },
			exporting: { enabled: false },
			legend: { enabled: false },
			xAxis: {
				categories: genderCategories,
				title: { text: null },
				lineColor: '#dfe4e4',
				tickColor: '#dfe4e4',
				labels: {
					style: {
						color: '#7d878f',
						fontSize: '12px'
					}
				}
			},
			yAxis: {
				title: { text: '대여 건수' },
				gridLineColor: '#e9eeee',
				labels: {
					style: {
						color: '#7d878f',
						fontSize: '12px'
					}
				}
			},
			tooltip: {
				valueSuffix: '건'
			},
			plotOptions: {
				column: {
					borderRadius: 6,
					pointPadding: 0.08,
					groupPadding: 0.15
				}
			},
			series: [{
				name: '대여 건수',
				data: genderData,
				color: '#4e9df7'
			}]
		});

		$('.chart-title-left').text('🚻 성별 이용량 추이');
	}

	function renderTicketChart(response) {
		clearOverlayMessage();

		const categories = [];
		const ticketData = [];

		response.forEach(item => {
			const label = item.label ?? item.LABEL;
			const value = item.value ?? item.VALUE;
			categories.push(label);
			ticketData.push(Number(value));
		});

		Highcharts.chart('analysisChart', {
			accessibility: { enabled: false },
			chart: {
				type: 'bar',
				backgroundColor: '#fcfcfc',
				spacingTop: 20,
				spacingRight: 20,
				spacingBottom: 20,
				spacingLeft: 20
			},
			title: { text: null },
			credits: { enabled: false },
			exporting: { enabled: false },
			legend: { enabled: false },
			xAxis: {
				categories: categories,
				title: { text: null },
				lineColor: '#dfe4e4',
				tickColor: '#dfe4e4',
				labels: {
					style: {
						color: '#7d878f',
						fontSize: '12px'
					}
				}
			},
			yAxis: {
				title: { text: '대여 건수' },
				gridLineColor: '#e9eeee',
				labels: {
					style: {
						color: '#7d878f',
						fontSize: '12px'
					}
				}
			},
			tooltip: {
				valueSuffix: '건'
			},
			plotOptions: {
				bar: {
					borderRadius: 6,
					pointPadding: 0.08,
					groupPadding: 0.1
				}
			},
			series: [{
				name: '대여 건수',
				data: ticketData,
				color: '#f5a623'
			}]
		});

		$('.chart-title-left').text('🎟️ 이용권별 이용량 추이');
	}

	function renderEmptyChart(titleText, message) {
		clearOverlayMessage();

		Highcharts.chart('analysisChart', {
			accessibility: { enabled: false },
			chart: {
				type: 'line',
				backgroundColor: '#fcfcfc',
				spacingTop: 20,
				spacingRight: 20,
				spacingBottom: 20,
				spacingLeft: 20
			},
			title: { text: null },
			credits: { enabled: false },
			exporting: { enabled: false },
			legend: { enabled: false },
			xAxis: {
				categories: []
			},
			yAxis: {
				title: { text: null }
			},
			series: []
		});

		$('.chart-title-left').text(titleText);
		showOverlayMessage(message);
	}

	function loadAgeChart() {
		const filters = getFilterValues();

		$.ajax({
			url: '/api/analysis/age',
			method: 'GET',
			data: {
				startDate: filters.startDate,
				endDate: filters.endDate,
				keyword: filters.officeSelected,
				targetCol: 'USES',
				calcType: 'SUM'
			},
			success: function (response) {
				console.log('연령대별 응답 데이터:', response);
				renderAgeChart(response);
			},
			error: function (xhr, status, error) {
				console.error('연령대별 데이터 조회 실패:', error);
				console.log(xhr.responseText);
				renderEmptyChart('👤 연령대별 이용량 추이', '연령대별 데이터를 불러오지 못했습니다.');
			}
		});
	}

	function loadGenderChart() {
		const filters = getFilterValues();

		$.ajax({
			url: '/api/analysis/gender',
			method: 'GET',
			data: {
				startDate: filters.startDate,
				endDate: filters.endDate,
				keyword: filters.officeSelected
			},
			success: function (response) {
				console.log('성별 응답 데이터:', response);
				renderGenderChart(response);
			},
			error: function (xhr, status, error) {
				console.error('성별 데이터 조회 실패:', error);
				console.log(xhr.responseText);
				renderEmptyChart('🚻 성별 이용량 추이', '성별 데이터를 불러오지 못했습니다.');
			}
		});
	}

	function loadTicketChart() {
		const filters = getFilterValues();

		$.ajax({
			url: '/api/analysis/ticket',
			method: 'GET',
			data: {
				startDate: filters.startDate,
				endDate: filters.endDate,
				keyword: filters.officeSelected
			},
			success: function (response) {
				console.log('이용권별 응답 데이터:', response);
				renderTicketChart(response);
			},
			error: function (xhr, status, error) {
				console.error('이용권별 데이터 조회 실패:', error);
				console.log(xhr.responseText);
				renderEmptyChart('🎟️ 이용권별 이용량 추이', '이용권별 데이터를 불러오지 못했습니다.');
			}
		});
	}

	function requestOfficeSuggestions(keyword) {
		if (officeSearchXhr) {
			officeSearchXhr.abort();
			officeSearchXhr = null;
		}

		officeSearchXhr = $.ajax({
			url: '/api/offices/search',
			method: 'GET',
			data: { keyword: keyword },
			success: function (response) {
				renderOfficeSuggestions(response);
			},
			error: function (xhr, status) {
				if (status !== 'abort') {
					hideOfficeSuggestions();
				}
			},
			complete: function () {
				officeSearchXhr = null;
			}
		});
	}

	$('#officeKeyword').on('input', function () {
    const keyword = $(this).val().trim();
    $('#officeSelected').val('');

    clearTimeout(officeSearchTimer);

    if (officeSearchXhr) {
        officeSearchXhr.abort();
        officeSearchXhr = null;
    }

    if (keyword === '') {
        hideOfficeSuggestions();
        return;
    }

    // 1글자일 때는 조금 더 기다렸다가 요청
    const delay = keyword.length === 1 ? 450 : 250;

    officeSearchTimer = setTimeout(function () {
        requestOfficeSuggestions(keyword);
    }, delay);
});

	$(document).on('click', '.office-suggestion-item', function () {
		const officeName = $(this).data('name');
		$('#officeKeyword').val(officeName);
		$('#officeSelected').val(officeName);
		hideOfficeSuggestions();
	});

	$(document).on('click', function (e) {
		if (!$(e.target).closest('.office-search-group').length) {
			hideOfficeSuggestions();
		}
	});

	$('#startDate').on('change', function () {
		const startDate = $(this).val();
		$('#endDate').attr('min', startDate);
	});

	$('#endDate').on('change', function () {
		const endDate = $(this).val();
		$('#startDate').attr('max', endDate);
	});

	$('#applyFilterBtn').on('click', function () {
		const startDate = $('#startDate').val();
		const endDate = $('#endDate').val();

		if (startDate > endDate) {
			alert('시작일은 종료일보다 클 수 없습니다.');
			return;
		}

		loadSummary();

		const activeType = $('.tab.active').data('type');

		if (activeType === 'age') {
			loadAgeChart();
		} else if (activeType === 'ticket') {
			loadTicketChart();
		} else if (activeType === 'genderCode') {
			loadGenderChart();
		}
	});

	$('.tab').on('click', function () {
		const type = $(this).data('type');
		setActiveTab(type);

		if (type === 'age') {
			loadAgeChart();
		} else if (type === 'ticket') {
			loadTicketChart();
		} else if (type === 'genderCode') {
			loadGenderChart();
		}
	});

	loadSummary();
	loadAgeChart();
});

    document.addEventListener("DOMContentLoaded", function () {
        const memberId = document.getElementById("memberId")?.value;
        if (memberId) {
            initNotification(memberId);
        }
    });

</script>
</body>
</html>
