<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 | 운영 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f1f5f9; color: #1e293b; overflow: hidden; }

        #sidebar { width: 260px; background-color: #0f172a; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        #sidebar h2 { height: 80px; display: flex; align-items: center; padding: 0 30px; font-size: 1.3rem; font-weight: 800; color: #10b981; }
        #sidebar ul { list-style: none; padding: 20px 0; flex-grow: 1; }
        #sidebar ul li a { color: #94a3b8; text-decoration: none; display: block; padding: 15px 30px; transition: 0.2s; }
        #sidebar ul li.active a { background: #1e293b; color: #10b981; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        header { height: 64px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: flex-end; padding: 0 40px; }
        .container { flex: 1; padding: 40px; overflow-y: auto; }

        .action-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .tab-group { display: flex; background: #e2e8f0; padding: 4px; border-radius: 8px; gap: 4px; }
        .tab-btn { padding: 8px 16px; border-radius: 6px; font-size: 0.875rem; cursor: pointer; color: #64748b; text-decoration: none; font-weight: 600; }
        .tab-btn.active { background: white; color: #0f172a; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .search-group { display: flex; gap: 8px; }
        .search-group input { padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 8px; width: 300px; outline: none; }
        .btn-black { background: #0f172a; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        .table-container { background: white; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { background: #f8fafc; padding: 16px 24px; text-align: left; font-size: 0.75rem; color: #64748b; border-bottom: 1px solid #e2e8f0; }
        .admin-table td { padding: 20px 24px; border-bottom: 1px solid #e2e8f0; font-size: 0.95rem; }
        .admin-table tr:hover { background: #f8fafc; cursor: pointer; }

        .badge-notice { padding: 4px 10px; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; background: #eff6ff; color: #2563eb; }

        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
        .page-link { padding: 8px 12px; border-radius: 6px; background: white; border: 1px solid #e2e8f0; color: #64748b; text-decoration: none; }
        .page-link.active { background: #0f172a; color: white; border-color: #0f172a; }
    </style>
</head>
<body>
    <nav id="sidebar">
        <h2>SEOUL BIKE</h2>
        <ul>
            <li><a th:href="@{/dashboard/main}">📊 종합 분석</a></li>
            <li><a th:href="@{/members/search}">👤 회원 관리</a></li>
            <li class="active"><a th:href="@{/boards/notice}">📝 공지사항 관리</a></li>
            <li><a th:href="@{/boards/suggestion}">💡 건의사항 관리</a></li>
            <li><a th:href="@{/system}">⚙️ 시스템 설정</a></li>
        </ul>
    </nav>

    <div id="main-content">
        <header>
            <span style="font-size: 0.9rem; color: #64748b;">운영자 계정 접속 중</span>
        </header>

        <main class="container">
            <div class="action-row">
                <div class="tab-group">
                    <a th:href="@{/boards/notice}" class="tab-btn active">공지사항 리스트</a>
                    <a th:href="@{/boards/suggestion}" class="tab-btn">건의사항 리스트</a>
                </div>

                <form th:action="@{/boards/notice}" method="get" class="search-group">
                    <input type="text" name="keyword" th:value="${searchDto.keyword}" placeholder="공지 제목 검색...">
                    <button type="submit" class="btn-black">검색</button>
                </form>
            </div>

            <div class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th width="80">번호</th>
                            <th width="120">구분</th>
                            <th>제목</th>
                            <th width="150">작성자</th>
                            <th width="150">등록일</th>
                            <th width="100" style="text-align: center;">조회</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(list)}">
                            <td colspan="6" style="text-align: center; color: #94a3b8; padding: 40px;">데이터가 없습니다.</td>
                        </tr>
                        <tr th:each="post : ${list}" th:onclick="|location.href='@{/boards/view/{id}(id=${post.boardId})}'|">
                            <td th:text="${post.boardId}">0</td>
                            <td><span class="badge-notice">공지사항</span></td>
                            <td style="font-weight: 600;" th:text="${post.title}">제목</td>
                            <td th:text="${post.writer}">ADMIN</td>
                            <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">2026-04-10</td>
                            <td style="text-align: center;" th:text="${post.viewCount}">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination" th:if="${totalPages > 1}">
                <th:block th:each="num : ${#numbers.sequence(1, totalPages)}">
                    <a th:href="@{/boards/notice(page=${num}, keyword=${searchDto.keyword})}" 
                       th:text="${num}" 
                       class="page-link" th:classappend="${num == searchDto.page} ? 'active' : ''"></a>
                </th:block>
            </div>
            
            <div style="margin-top: 24px; display: flex; justify-content: flex-end;">
                <button class="btn-black" th:onclick="|location.href='@{/boards/write(category='NOTICE')}'|">공지 등록</button>
            </div>
        </main>
    </div>

    <script th:inline="javascript">
        // 뒤로가기 시 조회수 갱신을 위한 새로고침 로직
        window.onpageshow = function(event) {
            if (event.persisted || (window.performance && window.performance.navigation.type === 2)) {
                window.location.reload();
            }
        };
    </script>
</body>
</html>
