<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow" style="width: 350px;">

        <h3 class="text-center mb-3">로그인</h3>
        <div class="text-center mt-3">
    	<a th:href="@{/signup}" class="btn btn-outline-secondary w-100">
        	회원가입
    	</a>
		</div>

        <!-- 로그인 실패 메시지 -->
        <div th:if="${param.error}" class="alert alert-danger">
            아이디 또는 비밀번호가 틀렸습니다.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input type="text" name="username" class="form-control" placeholder="아이디 입력">
            </div>

            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="비밀번호 입력">
            </div>

            <button type="submit" class="btn btn-primary w-100">로그인</button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/signup}">회원가입</a>
        </div>

    </div>
</div>

</body>
</html>
