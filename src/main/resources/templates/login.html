<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/button.css}">
</head>
<body class="bg-dark-green">

<h1 th:text="#{home.message}">기본값</h1>

<form method="get" style="display:inline;">
    <select name="lang" onchange="this.form.submit()">
        <option value="ko" th:selected="${#locale.language == 'ko'}" th:text="#{language.korean}">KR</option>
        <option value="en" th:selected="${#locale.language == 'en'}" th:text="#{language.english}">EN</option>
    </select>
</form>

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow rounded-4" style="width: 350px;">

        <h3 class="logo-font text-center">SEOUL BIKE</h3>
        <h5 class="subtitle-gray-font text-center mb-4">데이터 분석 시스템에 로그인하세요</h5>

        <!-- 로그인 실패 메시지 -->
        <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}">
            아이디 또는 비밀번호가 틀렸습니다.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="subtitle-dark-blue-font">아이디</label>
                <input type="text" name="username" class="form-control" th:placeholder="#{login.username.placeholder}" placeholder="아이디를 입력하세요"
                	style="font-size: 14px; padding:12px 12px; border-radius:8px">
            </div>

            <div class="mb-3">
                <label class="subtitle-dark-blue-font">비밀번호</label>
                <input type="password" name="password" class="form-control" th:placeholder="#{login.password.placeholder}" placeholder="비밀번호를 입력하세요"
                	style="font-size: 14px; padding:12px 12px; border-radius:8px">
            </div>

            <button type="submit" class="ok-button">로그인</button>
        </form>

        <div class="d-flex mt-3 gap-2">
            <a th:href="@{/signup}" class="btn btn-outline-secondary account-set-button" style="flex: 1;" th:text="#{signup.button}">
                회원가입
            </a>
            <a th:href="@{/find-account}" class="btn btn-outline-secondary account-set-button" style="flex: 1;">
                아이디/비밀번호 찾기
            </a>
        </div>

    </div>
</div>

</body>
</html>
