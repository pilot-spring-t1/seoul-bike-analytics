<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/button.css}">
</head>
<body class="bg-dark-green">

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow rounded-3" style="width: 350px;">

        <h3 class="logo-font text-center">SEOUL BIKE</h3>
        <h5 class="subtitle-gray-font text-center mb-4">데이터 분석 시스템에 로그인하세요</h5>

        <!-- 로그인 실패 메시지 -->
        <div th:if="${param.error}" class="alert alert-danger">
            아이디 또는 비밀번호가 틀렸습니다.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="subtitle-dark-blue-font">아이디</label>
                <input type="text" name="username" class="form-control" placeholder="아이디 입력">
            </div>

            <div class="mb-3">
                <label class="subtitle-dark-blue-font">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="비밀번호 입력">
            </div>

            <button type="submit" class="ok-button rounded-3">로그인</button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/signup}">회원가입</a>
        </div>

    </div>
</div>

</body>
</html>
