<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/button.css}">
</head>
<body class="bg-dark-green">

<h1 th:text="#{home.message}">기본값</h1>

<form method="get" style="display:inline;">
    <select name="lang" onchange="this.form.submit()">
        <option value="ko" th:selected="${#locale.language == 'ko'}" th:text="#{language.korean}">KR</option>
        <option value="en" th:selected="${#locale.language == 'en'}" th:text="#{language.english}">EN</option>
    </select>
</form>

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow rounded-3" style="width: 350px;">

        <h3 class="text-center mb-3" th:text="#{login.heading}">로그인</h3>

        <!-- 로그인 실패 메시지 -->
        <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}">
            아이디 또는 비밀번호가 틀렸습니다.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" th:text="#{login.username}">아이디</label>
                <input type="text" name="username" class="form-control" th:placeholder="#{login.username.placeholder}" placeholder="아이디 입력">
            </div>

            <div class="mb-3">
                <label class="form-label" th:text="#{login.password}">비밀번호</label>
                <input type="password" name="password" class="form-control" th:placeholder="#{login.password.placeholder}" placeholder="비밀번호 입력">
            </div>

            <button type="submit" class="btn btn-primary w-100" th:text="#{login.button}">
                로그인
            </button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/signup}" class="btn btn-outline-secondary w-100" th:text="#{signup.button}">
                회원가입
            </a>
        </div>

    </div>
</div>

</body>
</html>
