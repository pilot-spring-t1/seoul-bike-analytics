<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8" />
	<title th:text="#{signup.title}">Join Us</title>
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	
	<link rel="stylesheet" th:href="@{/css/color.css}">
	<link rel="stylesheet" th:href="@{/css/fonts.css}">
	<link rel="stylesheet" th:href="@{/css/button.css}">
	<style>
		.form-control {
			width: 100%;
			height: 44px;
			border: 1px solid #d7d7d7;
			border-radius: 12px;
			padding: 0 14px;
			font-size: 14px;
			color: #333;
			background: #fff;
			outline: none;
		}
		
		.form-control::placeholder {
			color: #a0a0a0;
		}
		
		.form-control:focus {
			border-color: #24b8a6;
			box-shadow: 0 0 0 3px rgba(36, 184, 166, 0.12);
		}
		
		.agree-wrap {
			display: flex;
			align-items: center;
			gap: 8px;
			margin: 10px 0 24px;
			color: #9a9a9a;
			font-size: 14px;
		}
		
		.agree-wrap input[type="checkbox"] {
			width: 16px;
			height: 16px;
			margin: 0;
		}
		
		.bottom-text {
			text-align: center;
			font-size: 14px;
			color: #A9A9A9;
			font-weight: 800;
		}
		
		.bottom-text a {
			color: #24b8a6;
			text-decoration: none;
			font-weight: 800;
		}
		
		.bottom-text a:hover {
			text-decoration: underline;
		}
	</style>
</head>
<body class="bg-dark-green">

	<form method="get" style="position:fixed; top:20px; right:20px; margin:0;">
	    <select name="lang" onchange="this.form.submit()">
	        <option value="ko" th:selected="${#locale.language == 'ko'}" th:text="#{language.korean}">KR</option>
	        <option value="en" th:selected="${#locale.language == 'en'}" th:text="#{language.english}">EN</option>
	    </select>
	</form>

	<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
		<div class="card p-4 shadow rounded-4" style="width: 350px;">
			<h3 class="logo-font text-center" th:text="#{signup.logo}">JOIN US</h3>
			<h5 class="subtitle-gray-font text-center mb-4" th:text="#{signup.subtitle}">
				따릉이 데이터 분석 일원이 되어보세요
			</h5>
			
			<form th:action="@{/members/signup}" method="post">
				<div class="mb-3">
					<label class="subtitle-dark-blue-font" th:text="#{signup.userId}">아이디</label>
					<input
					  type="text"
					  id="loginId"
					  name="loginId"
					  class="form-control"
					  th:placeholder="#{signup.userId.placeholder}"
					  placeholder="4~12자 영문/숫자"
					/>
				</div>
				
				<div class="mb-3">
					<label class="subtitle-dark-blue-font" th:text="#{signup.password}">비밀번호</label>
					<input
					  type="password"
					  id="password"
					  name="password"
					  class="form-control"
					  th:placeholder="#{signup.password.placeholder}"
					  placeholder="8자 이상 특수문자 포함"
					/>
				</div>
				
				<div class="mb-3">
					<label class="subtitle-dark-blue-font" th:text="#{signup.passwordCheck}">비밀번호 확인</label>
					<input
					  type="password"
					  id="passwordCheck"
					  class="form-control"
					  th:placeholder="#{signup.passwordCheck.placeholder}"
					  placeholder="비밀번호 재입력"
					/>
				</div>
				
				<div class="mb-3">
        			<label class="subtitle-dark-blue-font" th:text="#{signup.name}">이름</label>
        			<input
        			  type="text"
        			  name="name"
        			  class="form-control"
        			/>
    			</div>
    			
    			<div class="mb-3">
    				<label class="subtitle-dark-blue-font" th:text="#{signup.gender}">성별</label>
    				<div class="d-flex gap-3 mt-2">
        				<div class="form-check">
            				<input class="form-check-input" type="radio" name="gender" id="genderM" value="M" checked>
            				<label class="form-check-label" for="genderM" th:text="#{signup.gender.male}">남성</label>
        				</div>
        				<div class="form-check">
            				<input class="form-check-input" type="radio" name="gender" id="genderF" value="F">
            				<label class="form-check-label" for="genderF" th:text="#{signup.gender.female}">여성</label>
        				</div>
    				</div>
				</div>

    			<div class="mb-3">
        			<label class="subtitle-dark-blue-font" th:text="#{signup.age}">나이</label>
        			<input
        			  type="number"
        			  name="age"
        			  class="form-control"
        			/>
    			</div>
				
				<label class="subtitle-gray-font text-center mb-4">
					<input type="checkbox" required />
					<span th:text="#{signup.agree}">개인정보 수집 및 이용에 동의합니다.</span>
				</label>
				
				<button type="submit" class="ok-button" th:text="#{signup.submit}">가입하기</button>
				
				<div class="bottom-text mt-3">
					<span th:text="#{signup.hasAccount}">이미 계정이 있으신가요?</span>
					<a th:href="@{/members/login}" th:text="#{signup.loginLink}">로그인</a>
				</div>
			</form>
		</div>
	</div>
<script th:inline="javascript">
    /*<![CDATA[*/
    const message = [[${message}]];
    const error = [[${error}]];
    
    if (message) {
        alert(message);
    }
    
    if (error) {
        alert(error);
    }
    /*]]>*/
</script>

<div th:if="${message}" class="alert alert-success mt-3" th:text="${message}"></div>
<div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

</body>

</html>
