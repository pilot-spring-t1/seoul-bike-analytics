<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/button.css}">
    
    <style>
    	.form-control {
			width: 100%;
			height: 44px;
			border: 1px solid #d7d7d7;
			border-radius: 12px;
			padding: 0 14px;
			font-size: 14px;
			color: #333;
			background: #fff;
			outline: none;
		}
		
		.form-control::placeholder {
			color: #a0a0a0;
		}
		
		.form-control:focus {
			border-color: #24b8a6;
			box-shadow: 0 0 0 3px rgba(36, 184, 166, 0.12);
		}
    </style>
</head>
<body class="bg-dark-green">

<form method="get" style="position:fixed; top:20px; right:20px; margin:0;">
    <select name="lang" onchange="this.form.submit()">
        <option value="ko" th:selected="${#locale.language == 'ko'}" th:text="#{language.korean}">KR</option>
        <option value="en" th:selected="${#locale.language == 'en'}" th:text="#{language.english}">EN</option>
    </select>
</form>

<div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="card p-4 shadow rounded-4" style="width: 350px;">

        <h3 class="logo-font text-center" th:text="#{login.logo}">SEOUL BIKE</h3>
        <h5 class="subtitle-gray-font text-center mb-4" th:text="#{login.subtitle}">
            데이터 분석 시스템에 로그인하세요
        </h5>

        <div th:if="${param.error}" class="alert alert-danger" th:text="#{login.error}">
            아이디 또는 비밀번호가 틀렸습니다.
        </div>

        <form th:action="@{/members/login}" method="post">
            <div class="mb-3">
                <label class="subtitle-dark-blue-font" th:text="#{login.username}">아이디</label>
                <input
                    type="text"
                    name="loginId"
                    class="form-control"
                    th:placeholder="#{login.username.placeholder}"
                    placeholder="아이디를 입력하세요"
                    style="font-size: 14px; padding:12px 12px; border-radius:8px">
            </div>

            <div class="mb-4">
                <label class="subtitle-dark-blue-font">비밀번호</label>
                <input type="password" name="password" class="form-control" th:placeholder="#{login.password.placeholder}" placeholder="비밀번호를 입력하세요"
                	style="font-size: 14px; padding:12px 12px; border-radius:8px">
            </div>

            <button type="submit" class="ok-button" th:text="#{login.button}">로그인</button>
        </form>

        <div class="d-flex mt-3 gap-2">
            <a th:href="@{/members/signup}" class="btn btn-outline-secondary account-set-button" style="flex: 1;" th:text="#{signup.button}">
                회원가입
            </a>
        </div>

    </div>
</div>
<script th:inline="javascript">
    /*<![CDATA[*/
    
    // 뒤의 null은 서버에서 값이 없을 때(null일 때) 대입될 기본값입니다.
    // Thymeleaf가 렌더링될 때 주석 부분을 제거하고 실제 값으로 치환합니다.
    const message = /*[[${message}]]*/ null;
    const error = /*[[${error}]]*/ null;
    
    if (message) {
        alert(message);
    }
    
    if (error) {
        alert(error);
    }
    
    /*]]>*/
</script>

<div th:if="${message}" class="alert alert-success mt-3" th:text="${message}"></div>
<div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

</body>
</html>
