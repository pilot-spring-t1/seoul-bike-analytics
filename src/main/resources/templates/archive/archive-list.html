<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{archive.page.title}">시스템 아카이브 | 운영 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <style>
        /* 레이아웃 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f8fafc; color: #1e293b; overflow: hidden; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
        header { height: 64px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: flex-end; padding: 0 40px; }
        
        .container { flex: 1; padding: 40px; overflow-y: auto; }
        .action-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .page-title { font-size: 1.6rem; font-weight: 900; color: #0f172a; letter-spacing: -0.03em; }
        
        /* 검색창 */
        .search-group { display: flex; gap: 8px; }
        .search-group input { padding: 12px 20px; border: 1px solid #e2e8f0; border-radius: 12px; width: 320px; outline: none; font-size: 0.95rem; transition: 0.2s; }
        .search-group input:focus { border-color: #10b981; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .btn-black { background: #0f172a; color: white; border: none; padding: 12px 28px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }

        /* 테이블 디자인 */
        .table-container { background: white; border-radius: 20px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th { background: #ffffff; padding: 20px 24px; text-align: left; font-size: 0.8rem; color: #94a3b8; border-bottom: 2px solid #f8fafc; font-weight: 700; text-transform: uppercase; }
        .admin-table td { padding: 24px; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
        .admin-table tr:hover { background: #fafafa; }

        /* 아이콘/배지 */
        .icon-box { background: #f1f5f9; width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; margin-bottom: 6px; }
        .badge-archive { padding: 3px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; background: #e2e8f0; color: #475569; }

        /* 텍스트 스타일 */
        .archive-title { font-weight: 800; color: #0f172a; font-size: 1.1rem; margin-bottom: 4px; letter-spacing: -0.02em; }
        .archive-desc { font-size: 0.9rem; color: #64748b; font-weight: 400; line-height: 1.4; }
        .archive-date { color: #1e293b; font-weight: 600; font-size: 0.95rem; }

        /* ★ 이미지 기반 버튼 스타일 - 정밀 수정 ★ */
        .btn-download-sm { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            width: 85px; height: 60px; 
            font-size: 0.95rem; line-height: 1.1; color: #10b981; font-weight: 800; 
            text-decoration: none; border: 2.5px solid #10b981; border-radius: 20px; 
            background: white; transition: 0.2s; cursor: pointer;
        }
        .btn-download-sm:hover { background: #10b981; color: white; }
        
        .btn-delete-sm { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 65px; height: 60px; 
            font-size: 0.95rem; line-height: 1.1; color: #ff4d4d; font-weight: 800; 
            background: #fff5f5; border: none; border-radius: 20px; 
            cursor: pointer; transition: 0.2s;
        }
        .btn-delete-sm:hover { background: #ffebeb; transform: scale(0.98); }

        /* 등록 버튼 (아이콘 완벽 제거) */
        .btn-register {
            background: #10b981; color: white; border: none; 
            padding: 16px 36px; border-radius: 14px; font-weight: 800; 
            cursor: pointer; transition: 0.3s; font-size: 1.05rem;
        }
        .btn-register:hover { background: #059669; box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2); }

        /* 페이지네이션 */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 40px; }
        .page-link { padding: 10px 18px; border-radius: 10px; background: white; border: 1px solid #e2e8f0; color: #64748b; text-decoration: none; font-size: 0.95rem; font-weight: 600; }
        .page-link.active { background: #0f172a; color: white; border-color: #0f172a; }
    </style>
</head>

<body>
<div th:replace="~{fragment/sidebar :: sidebar('archive')}"></div>

<div id="main-content">

    <div th:replace="~{fragment/header :: header('dashboard.welcome', ${userName})}"></div>

    <main class="container">
        <div class="action-row">
            <h1 class="page-title" th:text="#{archive.title}">SYSTEM ARCHIVE</h1>

            <form th:action="@{/archive/list}" method="get" class="search-group">
                <input type="text" name="keyword" th:value="${searchDto != null ? searchDto.keyword : ''}" th:placeholder="#{archive.search.placeholder}">
                <button type="submit" class="btn-black" th:text="#{archive.search}">검색</button>
            </form>
        </div>

        <div class="table-container">
            <table class="admin-table">
                <thead>
                <tr>
                    <th width="80">ID</th>
                    <th width="120" th:text="#{archive.tablecontent.category}">구분</th>
                    <th th:text="#{archive.tablecontent.title}">자료 제목 및 상세 설명</th>
                    <th width="180" th:text="#{archive.tablecontent.date}">등록일</th>
                    <th width="120" style="text-align: center;" th:text="#{archive.tablecontent.filesize}">파일 용량</th>
                    <th width="180" style="text-align: center;" th:text="#{archive.tablecontent.action}">액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(list)}">
                    <td colspan="6" style="text-align: center; color: #94a3b8; padding: 60px 0;" th:text="#{archive.tablecontent.empty}">
                        조회된 아카이브 자료가 없습니다.
                    </td>
                </tr>
                <tr th:each="file : ${list}">
                    <td th:text="${file.archiveId}"></td>
                    <td><span class="badge-archive" th:text="#{archive.tablecontent.category.archive}">아카이브</span></td>
                    <td>
                        <div class="archive-title" th:text="${file.archiveTitle}"></div>
                        <div class="archive-desc" th:text="${file.archiveDesc}"></div>
                    </td>
                    <td class="archive-date" th:text="${#temporals.format(file.createdAt, 'yyyy-MM-dd')}"></td>
                    <td style="text-align: center; color: #64748b; font-size: 0.9rem;" 
                        th:text="${file.fileSize < 1024 * 1024} ? ${#numbers.formatDecimal(file.fileSize / 1024.0, 1, 1)} + ' KB' : ${#numbers.formatDecimal(file.fileSize / (1024.0 * 1024.0), 1, 1)} + ' MB'">
                    </td>
                    <td style="text-align: center;">
                        <div style="display: flex; justify-content: center; gap: 6px;">
                            <a th:href="@{/archive/download/{id}(id=${file.archiveId})}" class="btn-download-sm" th:text="#{archive.tablecontent.download}">
                                다운로드
                            </a>
                            <form sec:authorize="hasRole('ADMIN')" 
                                  th:action="@{/archive/delete/{id}(id=${file.archiveId})}" 
                                  method="post" 
                                  th:onsubmit="|return confirm('#{archive.delete.confirm}');|">
                                <button type="submit" class="btn-delete-sm" th:text="#{archive.delete}">삭제</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${totalPages > 0}">
            <th:block th:if="${totalPages > 1}" th:each="num : ${#numbers.sequence(1, totalPages)}">
                <a th:href="@{/archive/list(page=${num}, keyword=${searchDto != null ? searchDto.keyword : ''})}"
                   th:text="${num}" class="page-link"
                   th:classappend="${searchDto != null && num == searchDto.page} ? 'active' : ''"></a>
            </th:block>
        </div>

        <div style="margin-top: 24px; display: flex; justify-content: flex-end;"
             sec:authorize="hasRole('ADMIN')">
            <button class="btn-black" th:text="#{archive.tablecontent.register}"
                    th:onclick="|location.href='@{/archive/write}'|">
                ➕ 새 자료 등록
            </button>
        </div>
    </main>
</div>
</body>
</html>
