<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>알림 센터 | 따릉이 분석 서비스</title>
    
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/card.css}">
    
    <style>
    	.menu {
			list-style: none;
			padding-top: 18px;
			margin: 0;
			padding: 0;
		}
		.menu li {
			height: 60px;
			display: flex;
			align-items: center;
			padding: 0 26px;
			font-size: 18px;
			color: #f5f7fa;
			cursor: pointer;
		}
		.menu li span.icon {
			width: 28px;
			display: inline-block;
			margin-right: 12px;
			font-size: 22px;
		}
		.menu li.active {
			background-color: #37506a;
			color: #19c8af;
		}
		.menu li.notice {
			border-top: 1px solid rgba(255,255,255,0.12);
			margin-top: 4px;
		}
    
        .noti-item { display: flex; padding: 20px; border-bottom: 1px solid #eee; border-left: 4px solid transparent; background:white; transition: 0.2s; }
        .noti-item:hover { background: #f9f9f9; }
        .noti-icon { width: 40px; height: 40px; border-radius: 50%; background: #1abc9c; color: white; 
                     display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; }
        .noti-content { flex-grow: 1; }
        .noti-time { font-size: 0.8rem; color: #999; margin-top: 5px; }
        .unread { border-left: 4px solid #1abc9c; background: #f0fdfa; }
    </style>
</head>
<body class="bg" style="margin:0; padding:0">
    <nav style="
    	position: fixed;
    	width: 300px;
    	height: 100%;
    	background-color: #2C3E50;
    	color: white;
    	padding-top: 20px;
    	box-sizing: border-box;">
        <h2 class="logo-font text-center" style="padding: 0 0 0 30px">SEOUL BIKE</h2>
        <ul class="menu" style="margin: 0; padding: 0;">
            <li>
        		<a href="/dashboard" style="color: white; text-decoration: none;"><span class="icon">📊</span>종합 분석</a>
        	</li>
			<li>
				<a href="/analysis/detail" style="color: white; text-decoration: none;"><span class="icon">🔍</span>상세 분석</a>
			</li>
			<li>
				<a href="dashboard-map.html" style="color: white; text-decoration: none;"><span class="icon">🗺️</span>지역별 지도</a>
			</li>
			<li>
				<a href="/data-center" style="color: white; text-decoration: none;"><span class="icon">📁</span>데이터 센터</a>
			</li>
			<li class="notice active">
				<a href="/notifications" style="color: white; text-decoration: none;"><span class="icon">🔔</span>알림 내역</a>
			</li>
			<li>
				<a href="/" style="color: white; text-decoration: none;"><span class="icon">🔒</span>로그아웃</a>
			</li>
        </ul>
    </nav>

    <div style="margin-left: 300px; padding: 0; box-sizing: border-box;">
        <div style="
	        width: 100%;
	        height: 30px;
	        padding: 20px 0 20px 0;
	        margin: 0 0 20px 0;
	        box-shadow: 0 4px 6px -4px rgba(0, 0, 0, 0.3);
	        background-color: white;
	        display: flex;
	        align-items: center;
	        justify-content: flex-end;
	    ">
	    	<span style="margin-right: 20px;"><b>시스템 알림 센터</b></span>
	    	<select id="lang-select" style="margin-right: 20px;">
                <option value="ko">KR</option>
                <option value="en">EN</option>
            </select>
	    </div>

        <section style="margin:0 20px">
            <div>
                <div class="noti-item unread">
                    <div class="noti-icon">!]</div>
                    <div class="noti-content">
                        <strong>데이터 업데이트 완료</strong>
                        <p>2025년 5월 10일자 따릉이 이용정보 데이터가 성공적으로 적재되었습니다.</p>
                        <div class="noti-time">방금 전</div>
                    </div>
                </div>
                <div class="noti-item">
                    <div class="noti-icon">i</div>
                    <div class="noti-content">
                        <strong>시스템 정기 점검 안내</strong>
                        <p>금일 자정부터 02시까지 서버 점검이 예정되어 있습니다.</p>
                        <div class="noti-time">2시간 전</div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
