<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>알림 센터 | 따릉이 분석 서비스</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/card.css}">
    
    <style>
    	* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
	    body { display: flex; height: 100vh; overflow: hidden; }
		#sidebar { width: 260px; display: flex; flex-direction: column; flex-shrink: 0; }
	    #sidebar h2 { height: 100px; display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
	    #sidebar ul { list-style: none; padding: 20px 0; }
	    #sidebar ul li a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; }
	    #sidebar ul li.active a { background: #1abc9c; color: white; font-weight: bold; }
		#main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
		header { height: 60px; background: white; display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
		.container { flex: 1; padding: 30px; overflow-y: auto; }
		.notice {
			border-top: 2px solid rgba(255,255,255,0.12);
			margin-top: 4px;
		}
    
        .noti-item { display: flex; padding: 20px; border-bottom: 1px solid #eee; border-left: 4px solid transparent; background:white; transition: 0.2s; }
        .noti-icon { width: 40px; height: 40px; border-radius: 50%; background: #1abc9c; color: white; 
                     display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; }
        .noti-content { flex-grow: 1; }
        .noti-time { font-size: 0.8rem; color: #999; margin-top: 5px; }
        .unread { border-left: 4px solid #1abc9c; background: #f0fdfa; }

        .read-item {
            background: #f7f7f7;
            border-left: 4px solid #d0d7de;
        }
        .read-item .noti-icon {
            background: #9aa5b1;
        }
        .read-item .noti-content strong,
        .read-item .noti-content p {
            color: #666;
        }

        .noti-main {
            flex-grow: 1;
        }

        .noti-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 16px;
            flex-shrink: 0;
            justify-content: center;
        }

        .noti-btn {
            border: none;
            border-radius: 6px;
            padding: 7px 12px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

        .read-btn {
            background: #1abc9c;
            color: white;
        }
        .read-btn:hover {
            background: #16a085;
        }

        .delete-btn {
            background: #ef5350;
            color: white;
        }
        .delete-btn:hover {
            background: #d84343;
        }

        .empty-box {
            padding: 30px;
            background: white;
            text-align: center;
            color: #888;
            border: 1px solid #eee;
        }
    </style>
</head>
<body class="bg">
    <input type="hidden" id="memberId" th:value="${memberId}" value="1">

    <nav id="sidebar" class="menu-color">
        <h2 class="logo-font" th:text="#{dashboard.logo}">SEOUL BIKE</h2>
        <ul>
		    <li><a th:href="@{/dashboard}">📊 <span th:text="#{dashboard.menu.overview}">종합 분석</span></a></li>
		    <li><a th:href="@{/dashboard/detail}">🔍 <span th:text="#{dashboard.menu.detail}">상세 분석</span></a></li>
		    <li><a th:href="@{/dashboard/dashboard-map}">🗺️ <span th:text="#{dashboard.menu.map}">지역별 지도</span></a></li>
		    <li><a th:href="@{/dashboard/data-center}">📁 <span th:text="#{dashboard.menu.dataCenter}">데이터 센터</span></a></li>
		    <li class="notice active"><a th:href="@{/dashboard/notifications}">🔔 <span th:text="#{dashboard.menu.notifications}">알림 내역</span></a></li>
		    <li><a th:href="@{members/logout}">🔒 <span th:text="#{dashboard.menu.logout}">로그아웃</span></a></li>
	    </ul>
    </nav>

    <div id="main-content">
	    <header>
			<span style="margin-right: 20px;" class="subtitle-dark-blue-font">
                <b th:text="#{notification.title}">시스템 알림 센터</b>
            </span>
			<form method="get" style="margin: 0; margin-right: 10px;">
				<select name="lang" onchange="this.form.submit()">
					<option value="ko" th:selected="${#locale.language == 'ko'}"
						th:text="#{language.korean}">KR</option>
					<option value="en" th:selected="${#locale.language == 'en'}"
						th:text="#{language.english}">EN</option>
				</select>
			</form>
		</header>

		<main class="container">
            <div id="notificationList"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script src="/js/notification.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const memberId = document.getElementById("memberId")?.value;

            if (!memberId) return;

            initNotification(memberId);
            loadNotifications(memberId);

            document.addEventListener("notification-received", function (e) {
                const notification = e.detail;
                prependNotification(notification);
            });
        });

        function loadNotifications(memberId) {
            fetch('/api/notifications/' + memberId)
                .then(function (response) {
                    if (!response.ok) {
                        throw new Error("알림 조회 실패");
                    }
                    return response.json();
                })
                .then(function (data) {
                    const container = document.getElementById("notificationList");
                    container.innerHTML = "";

                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="empty-box">알림이 없습니다.</div>';
                        return;
                    }

                    data.forEach(function (notification) {
                        container.appendChild(createNotificationElement(notification));
                    });
                })
                .catch(function (error) {
                    console.error(error);
                });
        }

        function prependNotification(notification) {
            const container = document.getElementById("notificationList");

            if (container.querySelector(".empty-box")) {
                container.innerHTML = "";
            }

            const el = createNotificationElement(notification);
            container.prepend(el);
        }

        function createNotificationElement(notification) {
            const item = document.createElement("div");
            const isUnread = notification.isRead === 'N';

            item.className = "noti-item " + (isUnread ? "unread" : "read-item");
            item.setAttribute("data-noti-id", notification.notiId);
            item.setAttribute("data-is-read", notification.isRead);

            const actionHtml = isUnread
                ? `
                    <button class="noti-btn read-btn" onclick="markAsRead(${notification.notiId}, this)">읽음</button>
                    <button class="noti-btn delete-btn" onclick="deleteNotification(${notification.notiId}, this)">삭제</button>
                  `
                : `
                    <button class="noti-btn delete-btn" onclick="deleteNotification(${notification.notiId}, this)">삭제</button>
                  `;

            item.innerHTML = `
                <div class="noti-icon">${getIcon(notification.notiType)}</div>
                <div class="noti-main">
                    <div class="noti-content">
                        <strong>${escapeHtml(getTitle(notification.notiType))}</strong>
                        <p>${escapeHtml(notification.message || "")}</p>
                        <div class="noti-time">${formatDate(notification.createdAt)}</div>
                    </div>
                </div>
                <div class="noti-actions">
                    ${actionHtml}
                </div>
            `;

            return item;
        }

        function markAsRead(notiId, button) {
            fetch('/api/notifications/' + notiId + '/read', {
                method: 'PATCH'
            })
            .then(function (response) {
                if (!response.ok) {
                    throw new Error("읽음 처리 실패");
                }

                const item = button.closest('.noti-item');
                item.classList.remove('unread');
                item.classList.add('read-item');
                item.setAttribute('data-is-read', 'Y');

                const actions = item.querySelector('.noti-actions');
                actions.innerHTML = `
                    <button class="noti-btn delete-btn" onclick="deleteNotification(${notiId}, this)">삭제</button>
                `;

                if (typeof unreadCount !== "undefined") {
                    unreadCount = Math.max(0, unreadCount - 1);
                    updateBadge();
                }
            })
            .catch(function (error) {
                console.error(error);
                alert('읽음 처리 중 오류가 발생했습니다.');
            });
        }

        function deleteNotification(notiId, button) {
            fetch('/api/notifications/' + notiId, {
                method: 'DELETE'
            })
            .then(function (response) {
                if (!response.ok) {
                    throw new Error("삭제 실패");
                }

                const item = button.closest('.noti-item');
                const wasUnread = item.getAttribute('data-is-read') === 'N';

                item.remove();

                if (wasUnread && typeof unreadCount !== "undefined") {
                    unreadCount = Math.max(0, unreadCount - 1);
                    updateBadge();
                }

                const container = document.getElementById("notificationList");
                if (!container.children.length) {
                    container.innerHTML = '<div class="empty-box">알림이 없습니다.</div>';
                }
            })
            .catch(function (error) {
                console.error(error);
                alert('삭제 중 오류가 발생했습니다.');
            });
        }

        function getIcon(type) {
            switch (type) {
                case "SYSTEM": return "!";
                case "COMMENT": return "💬";
                case "LIKE": return "♥";
                case "BOARD": return "📢";
                case "RENTAL": return "🚲";
                default: return "i";
            }
        }

        function getTitle(type) {
            switch (type) {
                case "SYSTEM": return "시스템 알림";
                case "COMMENT": return "댓글 알림";
                case "LIKE": return "좋아요 알림";
                case "BOARD": return "공지 알림";
                case "RENTAL": return "대여 완료";
                default: return "알림";
            }
        }

        function formatDate(dateTimeString) {
            if (!dateTimeString) return "";
            const date = new Date(dateTimeString);
            return date.toLocaleString("ko-KR");
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
