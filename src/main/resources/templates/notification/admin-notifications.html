    <style>
    	* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
	    body { display: flex; height: 100vh; overflow: hidden; }
		#sidebar { width: 260px; display: flex; flex-direction: column; flex-shrink: 0; }
	    #sidebar h2 { height: 100px; display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
	    #sidebar ul { list-style: none; padding: 20px 0; }
	    #sidebar ul li a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; }
	    #sidebar ul li.active a { background: #1abc9c; color: white; font-weight: bold; }
		#main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
		header { height: 60px; background: white; display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
		.container { flex: 1; padding: 30px; overflow-y: auto; }
		.notice {
			border-top: 2px solid rgba(255,255,255,0.12);
			margin-top: 4px;
		}
    
        .noti-item { display: flex; padding: 20px; border-bottom: 1px solid #eee; border-left: 4px solid transparent; background:white; transition: 0.2s; }
        .noti-item:hover { background: #f9f9f9; }
        .noti-icon { width: 40px; height: 40px; border-radius: 50%; background: #1abc9c; color: white; 
                     display: flex; align-items: center; justify-content: center; margin-right: 15px; flex-shrink: 0; }
        .noti-content { flex-grow: 1; }
        .noti-time { font-size: 0.8rem; color: #999; margin-top: 5px; }
        .unread { border-left: 4px solid #1abc9c; background: #f0fdfa; }
    </style>
</head>
