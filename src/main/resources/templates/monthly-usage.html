<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>월별 자전거 이용 추이</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="/js/highcharts/highcharts.js"></script>
    <script src="/js/highcharts/exporting.js"></script>
</head>
<body>

<h2>2025년 월별 자전거 이용 추이</h2>
<div id="monthlyUsageChart" style="width:100%; height:400px;"></div>

<script>
    console.log("Highcharts test:", window.Highcharts);

    $(function () {
        $.ajax({
            url: '/api/bike/monthly-usage?year=2025',
            method: 'GET',
            success: function (response) {
                console.log(response);

                const monthData = new Array(12).fill(0);

                response.forEach(item => {
                    monthData[item.month - 1] = item.totalUses;
                });

                Highcharts.chart('monthlyUsageChart', {
                    chart: {
                        type: 'spline'
                    },
                    title: {
                        text: '2025년 월별 자전거 이용 추이'
                    },
                    xAxis: {
                        categories: ['1월', '2월', '3월', '4월', '5월', '6월',
                                     '7월', '8월', '9월', '10월', '11월', '12월']
                    },
                    yAxis: {
                        title: {
                            text: '이용 건수'
                        }
                    },
                    tooltip: {
                        valueSuffix: '건'
                    },
                    series: [{
                        name: '이용 건수',
                        data: monthData
                    }]
                });
            },
            error: function (xhr, status, error) {
                console.error("에러 발생:", error);
                console.log(xhr.responseText);
                alert('월별 데이터를 불러오지 못했습니다.');
            }
        });
    });
</script>

</body>
</html>
