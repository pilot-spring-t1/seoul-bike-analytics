<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>관리자 | 콘텐츠 관리</title>
	
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
	<link rel="stylesheet" th:href="@{/css/color.css}">
    <link rel="stylesheet" th:href="@{/css/fonts.css}">
    <link rel="stylesheet" th:href="@{/css/button.css}">

	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
		body { display: flex; height: 100vh; overflow: hidden; }
		#sidebar { width: 260px; display: flex; flex-direction: column; flex-shrink: 0; }
		#sidebar h2 { height: 100px; display: flex; align-items: center; padding: 0 25px; border-bottom: 1px solid rgba(255,255,255,0.05); }
		#sidebar ul { list-style: none; padding: 20px 0; }
		#sidebar ul li a { color: #bdc3c7; text-decoration: none; display: block; padding: 15px 25px; }
		#sidebar ul li.active a { background: #1abc9c; color: white; font-weight: bold; }
		#main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
		header { height: 60px; background: white; display: flex; align-items: center; justify-content: flex-end; padding: 0 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
		.container { flex: 1; padding: 30px; overflow-y: auto; }
		.user-mgmt-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
		.notice {
			border-top: 2px solid rgba(255,255,255,0.12);
			margin-top: 4px;
		}

		/* 카드 */
		.card-row {
			display: flex;
			gap: 20px;
			margin-bottom: 25px;
		}
		.stat-card {
			flex: 1;
			background: white;
			border-radius: 15px;
			padding: 20px;
			box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
			border-top: 5px solid transparent;
		}
		.stat-card h4 {
			font-size: 0.9rem;
			color: #64748b;
			margin-bottom: 10px;
		}
		.stat-card .count {
			font-size: 1.8rem;
			font-weight: bold;
		}
		.tabs {
			display: flex;
			gap: 10px;
			margin-bottom: 15px;
		}
		.tabs button {
			padding: 8px 16px;
			border: none;
			background: #e2e8f0;
			border-radius: 8px;
			cursor: pointer;
		}
		.tabs button.active {
			background: #0f172a;
			color: white;
		}
		.search-bar {
			display: flex;
			justify-content: flex-end;
			margin-bottom: 10px;
		}
		.search-bar input {
			padding: 8px 12px;
			border-radius: 8px;
			border: 1px solid #e2e8f0;
			margin-right: 10px;
		}
		.search-bar button {
			padding: 8px 14px;
			background: #0f172a;
			color: white;
			border: none;
			border-radius: 8px;
			cursor: pointer;
		}
		.table {
			width: 100%;
			background: white;
			border-radius: 12px;
			border-collapse: collapse;
			overflow: hidden;
		}
		.table th {
			background: #f8fafc;
			padding: 20px;
			font-size: 0.85rem;
			color: #64748b;
			text-align: left;
		}
		.table td {
			padding: 20px;
			border-bottom: 1px solid #f1f5f9;
			font-size: 0.9rem;
			text-align: left;
		}
		.badge {
			padding: 5px 10px;
			border-radius: 6px;
			font-size: 0.75rem;
			font-weight: bold;
		}
		.badge-notice {
			background: #dbeafe;
			color: #2563eb;
		}
		
		.badge-qna {
			background: #e0e7ff;
			color: #6366f1;
		}
		.status {
			padding: 5px 10px;
			border-radius: 6px;
			font-size: 0.75rem;
		}
		.status-active {
			background: #dcfce7;
			color: #16a34a;
		}
		.status-wait {
			background: #e2e8f0;
			color: #475569;
		}
	</style>
</head>
<body class="bg-admin">
	<nav id="sidebar" class="menu-admin-color">
        <h2 class="logo-font">SEOUL BIKE</h2>
        <ul>
            <li><a href="#">📊 종합 분석</a></li>
            <li><a th:href="@{/detail}">🔍 <span th:text="#{dashboard.menu.detail}">상세 분석</span></a></li>
		    <li><a th:href="@{/dashboard-map}">🗺️ <span th:text="#{dashboard.menu.map}">지역별 지도</span></a></li>
		    <li><a th:href="@{/data-center}">📁 <span th:text="#{dashboard.menu.dataCenter}">데이터 센터</span></a></li>
		    <li class="notice"><a th:href="@{/notifications}">🔔 <span th:text="#{dashboard.menu.notifications}">알림 내역</span></a></li>
            <li><a th:href="@{/admin/members/search}">👤 회원 관리</a></li>
            <li class="active"><a href="#">📁 콘텐츠 관리</a></li>
			<li><a href="#">⚙️ 시스템 설정</a></li>
            <li><a th:href="@{/logout}">🔒 로그아웃</a></li>
        </ul>
    </nav>

	<div id="main-content">

		<header>
			<span style="margin-right: 20px;" class="subtitle-dark-blue-font">
            현재 서버 상태: <b style="color: #22c55e; margin-left: 5px;">Stable</b></span>
		
			<form method="get" style="margin: 0; margin-right: 10px;">
				<select name="lang" onchange="this.form.submit()">
					<option value="ko" th:selected="${#locale.language == 'ko'}"
						th:text="#{language.korean}">KR</option>
					<option value="en" th:selected="${#locale.language == 'en'}"
						th:text="#{language.english}">EN</option>
				</select>
			</form>
		</header>

		<div class="container">
			<div class="card-row">
				<div class="stat-card" style="border-top-color: #22c55e">
					<h4>📢 공지사항</h4>
					<div class="count">24 건</div>
				</div>

				<div class="stat-card" style="border-top-color: #3B82F6">
					<h4>❓ 미답변 문의</h4>
					<div class="count">8 건</div>
				</div>

				<div class="stat-card" style="border-top-color: #F59E0B">
					<h4>✨ 이용 후기</h4>
					<div class="count">1,120 건</div>
				</div>
			</div>

			<!-- 탭 -->
			<div class="tabs">
				<button class="active">전체</button>
				<button>공지사항</button>
				<button>이용문의</button>
				<button>후기/제안</button>
			</div>

			<!-- 검색 -->
			<div class="search-bar">
				<input type="text" placeholder="제목 또는 작성자 검색...">
				<button>검색</button>
			</div>

			<!-- 테이블 -->
			<table class="table">
				<thead>
					<tr>
						<th>ID</th>
						<th>카테고리</th>
						<th>제목</th>
						<th>작성자</th>
						<th>날짜</th>
						<th>상태</th>
					</tr>
				</thead>

				<tbody>
					<tr>
						<td>1240</td>
						<td>
							<span class="badge badge-notice">공지사항</span>
							<span class="badge badge-qna">이용문의</span>
						</td>
						<td>[안내] 점검 예정</td>
						<td>관리자</td>
						<td>2026-04-09</td>
						<td>
							<span class="status status-active">게시중</span>
							<span class="status status-wait">답변대기</span>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>

</body>
</html>
